<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIZE 학급 운영 시스템</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
  :root{
    --primary:#1a56db;--pl:#e8f0fe;--suc:#0e9f6e;--sl:#def7ec;
    --dan:#e02424;--dl:#fde8e8;--warn:#c27803;--wl:#fdf6b2;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g500:#6b7280;--g700:#374151;--g900:#111827;
    --r:12px;--sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--g900);min-height:100vh;font-size:15px;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .lcard{background:white;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:440px;box-shadow:0 4px 6px rgba(0,0,0,.07);}
  .llogo{text-align:center;margin-bottom:2rem;}
  .llogo h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;color:var(--primary);}
  .llogo p{color:var(--g500);font-size:.9rem;margin-top:.2rem;}
  .fg{margin-bottom:.9rem;}
  .fg label{display:block;font-size:.85rem;font-weight:500;color:var(--g700);margin-bottom:.35rem;}
  .fg select,.fg input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--g200);border-radius:10px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s;}
  .fg select:focus,.fg input:focus{border-color:var(--primary);}
  /* 학생 이름 선택 그리드 */
  .student-grid-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;margin-bottom:.9rem;}
  .stu-btn{padding:.5rem .3rem;border:1.5px solid var(--g200);border-radius:8px;background:var(--g50);font-size:.82rem;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:var(--g700);}
  .stu-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
  .stu-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:.62rem 1rem;border-radius:10px;border:none;font-size:.92rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
  .bp{background:var(--primary);color:white;}.bp:hover{background:#1648c4;}
  .bs{background:var(--g100);color:var(--g700);}.bs:hover{background:var(--g200);}
  .bsuc{background:var(--suc);color:white;}.bsuc:hover{background:#0a8c60;}
  .bdan{background:var(--dan);color:white;}.bdan:hover{background:#c41f1f;}
  .bsm{padding:.35rem .75rem;font-size:.82rem;}
  .bfull{width:100%;}
  #appScreen{display:none;min-height:100vh;flex-direction:column;}
  .topbar{background:white;border-bottom:1px solid var(--g200);padding:0 1.4rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .tlogo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--primary);}
  .nav-tabs{display:flex;background:white;border-bottom:1px solid var(--g200);padding:0 .8rem;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nt{padding:.7rem 1rem;font-size:.85rem;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
  .nt.active{color:var(--primary);border-bottom-color:var(--primary);}
  .nt:hover:not(.active){color:var(--g700);}
  .mc{padding:1.1rem;max-width:860px;margin:0 auto;width:100%;}
  .tc{display:none;}.tc.active{display:block;}
  .card{background:white;border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh);margin-bottom:.9rem;}
  .ct{font-size:.97rem;font-weight:700;color:var(--g900);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
  .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.9rem;}
  .si{background:var(--g50);border-radius:10px;padding:.85rem;text-align:center;}
  .sl{font-size:.75rem;color:var(--g500);margin-bottom:.2rem;}
  .sv{font-size:1.05rem;font-weight:700;}
  /* PnL Banner */
  .pb{border-radius:12px;padding:.9rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
  .pb.pos{background:#f0fdf4;border:1.5px solid #6ee7b7;}
  .pb.neg{background:#fef2f2;border:1.5px solid #fca5a5;}
  .pb.neu{background:var(--g50);border:1.5px solid var(--g200);}
  .pb-label{font-size:.82rem;color:var(--g700);margin-bottom:.12rem;}
  .pb-amt{font-size:1.3rem;font-weight:700;}
  .pb-pct{font-size:.83rem;font-weight:600;margin-top:.08rem;}
  /* Stock card */
  .sc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.65rem;}
  .sch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;}
  .scn{font-weight:700;font-size:.97rem;}
  .scp{text-align:right;}
  .scpv{font-size:1.1rem;font-weight:700;}
  .bdg{display:inline-block;padding:.16rem .55rem;border-radius:6px;font-size:.74rem;font-weight:500;}
  .bsemi{background:#dbeafe;color:#1e40af;}.bfood{background:#dcfce7;color:#166534;}.bent{background:#fce7f3;color:#9d174d;}
  .pnl-row{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.5rem;}
  .pnl-cell{border-radius:8px;padding:.48rem .7rem;}
  .pnl-cell-neu{background:var(--g50);}
  .pnl-cell-pos{background:#f0fdf4;}
  .pnl-cell-neg{background:#fef2f2;}
  /* News */
  .ni{padding:.7rem;border-left:3px solid var(--primary);background:var(--pl);border-radius:0 8px 8px 0;margin-bottom:.5rem;}
  .ni-title{font-size:.9rem;font-weight:500;}
  .ni-meta{font-size:.75rem;color:var(--g500);margin-top:.14rem;}
  /* Trade */
  .tr-row{display:flex;gap:.45rem;align-items:flex-end;flex-wrap:wrap;margin-top:.6rem;}
  .tr-row .fg{flex:1;min-width:100px;margin-bottom:0;}
  /* Rank */
  .ri{display:flex;align-items:center;gap:.85rem;padding:.7rem;border-radius:10px;margin-bottom:.45rem;background:var(--g50);}
  .rn{font-size:1rem;font-weight:700;min-width:26px;text-align:center;}
  .rn.gold{color:#d97706;}.rn.silver{color:#6b7280;}.rn.bronze{color:#92400e;}
  .ri-info{flex:1;}
  .ri-name{font-weight:600;font-size:.9rem;}
  .ri-sub{font-size:.76rem;color:var(--g500);}
  .ri-ret{font-size:.92rem;font-weight:700;margin-left:auto;}
  /* Deposit */
  .dc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.55rem;}
  .dch{display:flex;justify-content:space-between;align-items:flex-start;}
  .dct{font-weight:600;font-size:.9rem;}
  .dcr{font-size:.8rem;color:var(--suc);font-weight:500;}
  .dcd{font-size:.73rem;color:var(--g500);margin-top:.13rem;}
  /* Company */
  .co{border:1.5px solid var(--g200);border-radius:var(--r);padding:1rem;margin-bottom:.65rem;}
  .co-hd{display:flex;align-items:center;gap:.7rem;margin-bottom:.65rem;}
  .co-ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
  .co-nm{font-weight:700;font-size:.97rem;}
  .co-desc{font-size:.86rem;color:var(--g700);line-height:1.8;margin-bottom:.65rem;}
  .co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;}
  .co-st{background:var(--g50);border-radius:8px;padding:.55rem .7rem;text-align:center;}
  .co-stl{font-size:.7rem;color:var(--g500);margin-bottom:.12rem;}
  .co-stv{font-size:.9rem;font-weight:700;}
  /* Cashier / Teacher */
  .cr{border:1px solid var(--g200);border-radius:10px;padding:.75rem .9rem;margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:center;font-size:.86rem;}
  .ci{flex:1;}.cn{font-weight:600;}.cd{color:var(--g500);font-size:.76rem;}
  .ca{display:flex;gap:.32rem;}
  .tst{font-size:.85rem;font-weight:600;color:var(--g700);margin-bottom:.65rem;padding-bottom:.35rem;border-bottom:1px solid var(--g200);}
  .stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.45rem;}
  .sti{background:var(--g50);border-radius:8px;padding:.65rem .85rem;font-size:.83rem;}
  /* Modal */
  .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem;}
  .mo.open{display:flex;}
  .mi{background:white;border-radius:16px;padding:1.4rem;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;}
  .mi-t{font-size:.97rem;font-weight:700;margin-bottom:.9rem;}
  .mi-a{display:flex;gap:.45rem;margin-top:.9rem;}
  /* Toast */
  #toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);background:var(--g900);color:white;padding:.56rem 1.1rem;border-radius:20px;font-size:.86rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  /* Version badge */
  .ver{position:fixed;bottom:.6rem;right:.8rem;font-size:.7rem;color:var(--g500);background:rgba(255,255,255,.8);padding:.15rem .5rem;border-radius:20px;z-index:50;}
  /* Utils */
  .mt1{margin-top:.5rem;}.mt2{margin-top:1rem;}
  .flex{display:flex;}.gap2{gap:.5rem;}.jb{justify-content:space-between;}.ac{align-items:center;}
  .tsm{font-size:.84rem;}.txs{font-size:.75rem;}.fb{font-weight:700;}.tr{text-align:right;}
  .tg{color:var(--g500);}.tp{color:var(--primary);}.tsuc{color:var(--suc);}.tdan{color:var(--dan);}
  .div{border:none;border-top:1px solid var(--g200);margin:.9rem 0;}
  .empty{text-align:center;color:var(--g500);font-size:.85rem;padding:1.5rem;}
  .pbg{background:var(--wl);color:var(--warn);border-radius:999px;padding:.1rem .5rem;font-size:.72rem;font-weight:600;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  @media(max-width:480px){.sg{grid-template-columns:1fr 1fr;}.mc{padding:.9rem .75rem;}.topbar{padding:0 .85rem;}.student-grid-sel{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#f0f4f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:#1a56db;margin-bottom:1rem;">DAIZE 투자시스템</div>
  <div style="font-size:.85rem;color:#6b7280;margin-bottom:2rem;">한결초등학교 다이제국 전용</div>
  <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;"></div>

</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<!-- 주말 배너 -->
<div id="weekendBanner" style="display:none;background:#fdf6b2;color:#c27803;text-align:center;padding:.6rem;font-size:.85rem;font-weight:500;position:sticky;top:52px;z-index:90;">
  📅 주말에는 시장이 열리지 않습니다. 평일(월~금)에 거래해 주세요.
</div>

<div class="ver">v2.1</div>

<div id="loginScreen" style="display:none;">
  <div class="lcard">
    <div class="llogo">
      <img src="daize_logo.png" alt="DAIZE 로고" style="width:140px;margin-bottom:.5rem;" onerror="this.style.display='none'"/>
      <h1>DAIZE 학급 운영 시스템</h1>
      <p>한결초등학교 다이제국 전용</p>

    </div>
    <div id="tchFields" style="display:none;">
      <div class="fg"><label>선생님 비밀번호</label><input type="password" id="tchPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <button class="btn bp bfull" style="margin-top:.4rem;" onclick="doLogin()" disabled>로그인</button>
    <div style="text-align:center;color:var(--g500);font-size:.75rem;margin:.85rem 0;">— 또는 —</div>
    <button class="btn bs bfull" onclick="showSetPwModal()" disabled>비밀번호 처음 설정</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.7rem;">
      <img src="daize_logo.png" alt="" style="height:32px;" onerror="this.style.display='none'"/>
      <div class="tlogo">DAIZE 학급 운영</div>
      <div style="font-size:.8rem;color:var(--g700);" id="topbarUser"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.45rem;">
      <span style="font-size:.68rem;color:var(--g500);" id="dateDisp"></span>
      <button class="btn bs bsm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="mc" id="mainContent"></div>
</div>

<div class="mo" id="modalOverlay">
  <div class="mi">
    <div class="mi-t" id="mTitle"></div>
    <div id="mBody"></div>
    <div class="mi-a" id="mActs"></div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
const STUDENTS=[
  {no:1,name:'강이준'},{no:2,name:'구나혜'},{no:3,name:'김다해'},{no:4,name:'김시환'},
  {no:5,name:'김은중'},{no:6,name:'김지유'},{no:7,name:'김태연'},{no:8,name:'류다현'},
  {no:9,name:'박승현'},{no:10,name:'박유성'},{no:11,name:'손서율'},{no:12,name:'신서윤'},
  {no:13,name:'양이든'},{no:14,name:'오윤재'},{no:15,name:'오은우'},{no:16,name:'유체정'},
  {no:17,name:'이학진'},{no:18,name:'장연두'},{no:19,name:'전하율'},{no:20,name:'조혜리'},
  {no:21,name:'최은재'},{no:22,name:'허남희'},{no:23,name:'황동현'},{no:30,name:'김승언'}
];
const STOCKS=[
  {id:'semi',name:'DAIZE 반도체',sector:'반도체',badge:'bsemi',emoji:'💻',color:'#1e40af',bg:'#dbeafe'},
  {id:'food',name:'DAIZE 식품',  sector:'식품',  badge:'bfood',emoji:'🍱',color:'#166534',bg:'#dcfce7'},
  {id:'ent', name:'DAIZE 엔터',  sector:'엔터',  badge:'bent', emoji:'🎵',color:'#9d174d',bg:'#fce7f3'}
];
const CO_INFO={
  semi:{
    fullName:'DAIZE 반도체 주식회사',
    desc:`DAIZE 반도체는 스마트폰, 컴퓨터, 텔레비전 등 거의 모든 전자 제품 안에 들어가는 아주 작은 부품인 '반도체 칩'을 만드는 회사예요.\n\n쌀알보다도 훨씬 작은 이 칩 안에 수십억 개의 아주 작은 스위치가 들어 있어서, 기계가 계산하고 생각하고 기억할 수 있게 해 줘요. 마치 사람의 뇌 역할을 하는 거랍니다.\n\n최근에는 AI(인공지능)가 크게 유행하면서, AI가 학습하고 생각하는 데 필요한 특수 칩의 수요가 전 세계에서 폭발적으로 늘고 있어요. 전 세계 IT 회사들이 DAIZE 반도체의 칩을 사기 위해 줄을 서고 있답니다!`,
    ceo:'김철수', employees:'4,800명', founded:'2001년'
  },
  food:{
    fullName:'DAIZE 식품 주식회사',
    desc:`DAIZE 식품은 라면, 냉동식품, 과자, 음료 등 맛있는 먹거리를 만드는 회사예요. 우리가 편의점이나 마트에서 자주 보는 식품들이 DAIZE 식품에서 나온답니다.\n\n특히 한국 음식(K-푸드)이 전 세계적으로 인기를 끌면서, 동남아시아와 미국, 유럽에서도 DAIZE 식품 제품을 즐겨 먹고 있어요. 라면 하나가 외국에서 선물로 인기 있을 정도예요!\n\n건강에 관심이 높아지면서 칼로리를 줄인 제품이나 채소로 만든 식품도 열심히 개발하고 있어요. 간편하면서도 건강하게 먹고 싶은 사람들에게 꼭 필요한 회사랍니다.`,
    ceo:'박민정', employees:'3,200명', founded:'1995년'
  },
  ent:{
    fullName:'DAIZE 엔터테인먼트 주식회사',
    desc:`DAIZE 엔터테인먼트는 가수, 배우, 유튜버 등 연예인을 발굴하고 키워내는 회사예요. 우리가 좋아하는 K팝 아이돌 그룹이 여기서 탄생하기도 해요!\n\n이 회사는 음악 제작, 콘서트 기획, 드라마·영화 제작까지 다양한 사업을 해요. K팝은 이제 전 세계 팬들이 열광하는 문화가 됐어요. 미국 빌보드 차트에 오르거나, 유럽·남미에서 콘서트를 열면 수만 명이 모여들어요.\n\n요즘은 음악 스트리밍, 팬덤 앱, 굿즈(가수 관련 상품) 판매로도 큰 수익을 올려요. 팬이 많아질수록 회사 가치도 높아지는 구조랍니다.`,
    ceo:'이지영', employees:'1,600명', founded:'2008년'
  }
};

const NP={
  semi:[
    {t:'AI 반도체 수요 급증…글로벌 빅테크 주문 쇄도',p:true},{t:'미국 對中 반도체 수출 규제 강화 발표',p:false},
    {t:'DAIZE 반도체, 3nm 공정 개발 성공 발표',p:true},{t:'삼성·SK 등 경쟁사 대규모 증설 계획 공개',p:false},

// 30-day pre-sim
function sim30(){
  const h={semi:[100],food:[100],ent:[100]},news=[];
  for(let d=0;d<30;d++){
    const big=(d===14||d===29);
    STOCKS.forEach(s=>{
      const pool=NP[s.id],ni=pool[Math.floor(Math.random()*pool.length)];
      let mc=big?0.10:0.03,c=(Math.random()*mc*2)-mc;
      if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
      const prev=h[s.id][h[s.id].length-1];
      const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
      h[s.id].push(np);
      news.unshift({sid:s.id,t:ni.t,p:ni.p,date:`${30-d}일 전`,price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    });
  }
  return{h,news:news.slice(0,60)};
}

function runMarket(){
  if(!state) return;
  if(isWE()) return;
  const td=kst().toDateString();
  if(state.lastMD===td) return;
  state.lastMD=td; state.dayCount++;
  const big=(state.dayCount%22===0);

  // 시장 분위기별 변동성 설정
  const modeMap={
    normal: {max:0.015, bias:0},       // 일반: ±1.5%, 중립
    bull:   {max:0.02,  bias:0.004},    // 상승장: ±2%, 약양 편향
    bear:   {max:0.02,  bias:-0.004},   // 하락장: ±2%, 약음 편향
    flat:   {max:0.005, bias:0},        // 보합장: ±0.5%
    surge:  {max:0.06,  bias:0.03},     // 급상승: ±6%, 강양 편향
    crash:  {max:0.07,  bias:-0.04},    // 폭락장: ±7%, 강음 편향
  };
  const mode=modeMap[state.marketMode||'normal']||modeMap.normal;
  const bigMode=big?{max:0.08,bias:mode.bias*1.5}:mode;

  STOCKS.forEach(s=>{
    const pool=NP[s.id];
    // 교사 이슈가 있으면 우선 사용
    let ni=null;
    if(state.teacherIssues&&state.teacherIssues.length>0){
      const issue=state.teacherIssues.find(i=>i.sid===s.id&&!i.used);
      if(issue){ ni={t:issue.text,p:issue.p}; issue.used=true; }
    }
    if(!ni) ni=pool[Math.floor(Math.random()*pool.length)];

    const m=bigMode;
    // 기본 변동: bias + 랜덤
    let c=(Math.random()*m.max*2-m.max)+m.bias;
    // 뉴스 방향이 시세에 반영될 확률 (현실적으로 50%만 반영)
    const newsReflectChance=Math.random();
    const newsInfluence=newsReflectChance<0.5?0.35:0; // 50% 확률로만 뉴스 방향 반영
    if(ni.p) c=c*(1-newsInfluence)+Math.abs(c)*newsInfluence;
    else     c=c*(1-newsInfluence)-Math.abs(c)*newsInfluence;
    // 평균 하향 압력 (예금보다 약간 유리하게만 — 월3%예금 기준 일0.15%)
    c=c-0.0005;

    const prev=state.stocks[s.id].price;
    const np=Math.max(1,parseFloat((prev*(1+c)).toFixed(2)));
    state.stocks[s.id].price=np;
    state.stocks[s.id].history.push(np);
    if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
    state.news.unshift({
      sid:s.id,t:ni.t,p:ni.p,
      date:dStr(),price:np,prev,
      chg:((np-prev)/prev*100).toFixed(2),
      isTeacherIssue:!!(state.teacherIssues&&state.teacherIssues.find(i=>i.text===ni.t&&i.sid===s.id))
    });
  });
  // 사용한 이슈 제거
  if(state.teacherIssues) state.teacherIssues=state.teacherIssues.filter(i=>!i.used);
  if(state.news.length>60) state.news=state.news.slice(0,60);
  const now=kst();
  STUDENTS.forEach(s=>{
    const st=state.students[s.name];
    if(!st||!st.deps) return;
    st.deps.forEach(dep=>{
      if(!dep.done&&!dep.er&&new Date(dep.md)<=now){
        dep.done=true;
        const int=Math.round(dep.amt*dep.rate*dep.mon);
        const tax=Math.round(int*0.01);
        st.bal=parseFloat((st.bal+dep.amt+int-tax).toFixed(2));
        dep.ret=dep.amt+int-tax; dep.tax=tax;
      }
    });
  });
  ss();
}

// Cost basis
function updateCB(name,sid,qty,price,buy){
  const st=state.students[name];
  if(!st.cb) st.cb={semi:0,food:0,ent:0};
  if(buy){
    const cq=st.hld[sid]||0,cc=st.cb[sid]||0;
    st.cb[sid]=cq+qty>0?(cc*cq+price*qty)/(cq+qty):0;
  } else {
    if((st.hld[sid]||0)-qty<=0) st.cb[sid]=0;
  }
}

// Calc portfolio
function calcP(name){
  // students 데이터 없으면 기본값 반환
  if(!state.students) state.students={};
  if(!state.students[name])
    state.students[name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0}};
  const st=state.students[name];
  if(!st.hld) st.hld={semi:0,food:0,ent:0};
  if(!st.cb)  st.cb={semi:0,food:0,ent:0};
  if(!st.deps) st.deps=[];
  if(!state.stocks) return{st,sv:0,total:st.bal||0,inv:st.dep0||0,tpnl:-(st.dep0||0),tpct:0,sd:[],dl:0};
  let sv=0;
  const sd=STOCKS.map(s=>{
    const q=st.hld[s.id]||0,cp=state.stocks[s.id].price,ac=st.cb[s.id]||0;
    const val=q*cp,cost=q*ac,pnl=val-cost,pct=cost>0?(pnl/cost*100):0;
    sv+=val;
    return{s,q,cp,ac,val,cost,pnl,pct};
  });
  const dl=(st.deps||[]).filter(d=>!d.done&&!d.er).reduce((a,d)=>a+d.amt,0);
  const total=st.bal+sv+dl,inv=st.dep0||0;
  const tpnl=total-inv,tpct=inv>0?(tpnl/inv*100):0;
  return{st,sv,total,inv,tpnl,tpct,sd,dl};
}

function switchTab(id){
  cTab=id;
  document.querySelectorAll('.nt').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));

// 학생에게 동물 이모지 배정 (겹치지 않게)
function assignAnimalEmojis(){
  if(!state.animalEmojis) state.animalEmojis={};
  const used=new Set(Object.values(state.animalEmojis));
  const pool=[...ANIMAL_EMOJIS];
  STUDENTS.forEach(s=>{
    if(!state.animalEmojis[s.name]){
      const avail=pool.filter(e=>!used.has(e));
      const pick=avail[Math.floor(Math.random()*avail.length)]||pool[0];
      state.animalEmojis[s.name]=pick;
      used.add(pick);
    }
  });
}

function stuEmoji(name){
  const st=state.students[name];
  if(st&&st.customEmoji) return st.customEmoji;
  return (state.animalEmojis&&state.animalEmojis[name])||'🐾';
}

          <div class="txs tg">30일 누적 ${parseFloat(f30)>=0?'+':''}${f30}%</div>
        </div>
      </div>
      <div style="height:58px;margin-top:.4rem;">${miniChart(hist,isUp)}</div>
    </div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function miniChart(history,isUp){
  const data=history.slice(-31);if(data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data);
  const w=300,h=50,rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;"><polyline points="${pts}" fill="none" stroke="${isUp?'#0e9f6e':'#e02424'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function exTrade(sid,action){
  if(isWE()){showToast('주말에는 거래가 불가능합니다. 📅');return;}
  const st=state.students[cu.name],stk=state.stocks[sid];
  const qty=parseInt(document.getElementById('q-'+sid)?.value||0);
  if(!qty||qty<=0){showToast('수량을 입력해주세요.');return;}
  const sn=STOCKS.find(s=>s.id===sid).name;
  if(action==='buy'){
    const cost=qty*stk.price;
    if(cost>st.bal){showToast('투자 가능 금액이 부족합니다!');return;}
    updateCB(cu.name,sid,qty,stk.price,true);
    st.bal=parseFloat((st.bal-cost).toFixed(2));
    st.hld[sid]=(st.hld[sid]||0)+qty;
    showToast(`${sn} ${qty}주 매수! (-${fE2(cost)})`);
    playSound('buy');
  } else {
    const held=st.hld[sid]||0;
    if(qty>held){showToast(`보유 주식 부족 (보유: ${held}주)`);return;}
    const fee=qty*(state.sellFee||1),proc=qty*stk.price-fee;
    if(proc<0){showToast('수수료가 매도금액보다 큽니다.');return;}
    updateCB(cu.name,sid,qty,stk.price,false);
    st.bal=parseFloat((st.bal+proc).toFixed(2));
    st.hld[sid]-=qty;
    showToast(`${sn} ${qty}주 매도! (+${fE2(proc)}, 수수료 ${fE2(fee)})`);
    playSound('sell');
  }
  ss();
  const tradeEl=document.getElementById('investSubContent')||document.getElementById('tab-trade');
  if(tradeEl) rTrade(tradeEl);
}

function openDep(){
  const st=state.students[cu.name];
  const amt=parseFloat(document.getElementById('dA').value),mon=parseInt(document.getElementById('dM').value);

  const rate=mon===1?0.03:0.04,now=kst(),mat=new Date(now);
  mat.setMonth(mat.getMonth()+mon);
  st.bal=parseFloat((st.bal-amt).toFixed(2));
  if(!st.deps)st.deps=[];
  st.deps.push({amt,mon,rate,sd:now.toISOString(),md:mat.toISOString(),done:false,er:false});
  ss();showToast(`${mon}개월 예금 가입 완료!`);playSound('deposit');
  const depEl=document.getElementById('investSubContent')||document.getElementById('tab-deposit');
  if(depEl) rDeposit(depEl);
}
function earlyR(idx){
  const st=state.students[cu.name];
  const active=(st.deps||[]).filter(d=>!d.done&&!d.er);
  const dep=active[idx];if(!dep)return;
  openModal('중도해지 확인',`<p class="tsm">이자 없이 원금 <strong>${fE(dep.amt)}</strong>만 돌려받습니다.</p>`,[
    {l:'중도해지',c:'bdan',f:()=>{
      dep.er=true;dep.ret=dep.amt;
      st.bal=parseFloat((st.bal+dep.amt).toFixed(2));
      ss();showToast('중도해지 완료');closeModal();
      const depEl2=document.getElementById('investSubContent')||document.getElementById('tab-deposit');
      if(depEl2) rDeposit(depEl2);
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

const BAD_WORDS=['씨발','개새끼','병신','지랄','닥쳐','꺼져','미친놈','죽어','바보','멍청','돼지','찐따','장애','보지','자지','섹스','fuck','shit','bitch','ass'];

  let out=txt;

}

function addPatrolLog(){
  // 선택된 학생 수집
  const checked=[...document.querySelectorAll('#tab-patrol .pchk:checked')].map(c=>c.value);
  const content=document.getElementById('pContent').value.trim();
  const score=parseInt(document.getElementById('pScore').value);
  const dateInput=document.getElementById('pDate').value;
  if(!checked.length){showToast('대상 학생을 1명 이상 선택해주세요.');return;}
  if(!content){showToast('내용을 입력해주세요.');return;}
  const now=kst();
  const date=dateInput||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if(!state.patrolLog) state.patrolLog=[];
  // 선택된 학생마다 각각 기록 (ts에 index 붙여 고유값 보장)
  checked.forEach((target,i)=>{
    state.patrolLog.unshift({
      target, content, score, date,
      by:cu.name,
      ts:new Date().toISOString()+'_'+i
    });
  });
  state.patrolLog.sort((a,b)=>b.date.localeCompare(a.date));
  ss();
  showToast(`${checked.length}명 순찰일지 등록 완료!`);
  document.getElementById('pContent').value='';
  document.getElementById('pScore').value=1;
  document.getElementById('pScoreDisp').textContent='+1';
  document.getElementById('pScoreDisp').style.color='var(--suc)';
  rPatrol(document.getElementById('tab-patrol'));
}

function deletePatrolLog(idx){
  const filtered=getPatrolFiltered();
  const item=filtered[idx];
  if(!item) return;
  const realIdx=state.patrolLog.findIndex(l=>l.ts===item.ts);
  if(realIdx===-1) return;
  openModal('삭제 확인',`<p class="tsm"><strong>${item.target}</strong> - ${item.content} 기록을 삭제합니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      state.patrolLog.splice(realIdx,1);
      ss();closeModal();rPatrol(document.getElementById('tab-patrol'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function getPatrolFiltered(){
  return (state.patrolLog||[]).filter(l=>{
    const [y,m]=l.date.split('-');
    if(patrolFilter.year&&y!==patrolFilter.year) return false;
    if(patrolFilter.month&&m!==patrolFilter.month) return false;
    if(patrolFilter.student&&l.target!==patrolFilter.student) return false;
    return true;
  });
}

function setPatrolFilter(key,val){
  patrolFilter[key]=val;
  const el=document.getElementById('tab-patrol');
  if(el&&el.classList.contains('active')) rPatrol(el);
}

// ── SOUND EFFECTS (Web Audio API)
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='buy'){
      o.frequency.setValueAtTime(440,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='sell'){
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='deposit'){
      // 동전 소리 느낌
      o.frequency.setValueAtTime(1200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    }
  }catch(e){}
}

function appC(id){
  const req=state.pd.find(r=>r.id===id);if(!req)return;
  const st=state.students[req.to];
  if(req.type==='deposit'){
    st.bal=parseFloat((st.bal+req.amt).toFixed(2));st.dep0=(st.dep0||0)+req.amt;
    addTxLog('deposit',req.to,req.amt,cu.name,'요청 승인');
  } else {
    const amt=Math.round(req.amt);
    if(st.bal<amt){showToast('투자 가능 금액 부족');return;}
    st.bal=parseFloat((st.bal-amt).toFixed(2));st.dep0=Math.max(0,(st.dep0||0)-amt);
    addTxLog('withdraw',req.to,amt,cu.name,'요청 승인');
  }
  req.st='approved';ss();showToast(`${req.to} ${req.type==='deposit'?'입금':'출금'} 승인!`);
  rCashier(document.getElementById('tab-cashier'));
}
function rejC(id){
  const req=state.pd.find(r=>r.id===id);if(!req)return;
  addTxLog('reject',req.to,req.amt,cu.name,'요청 거절');
  req.st='rejected';ss();showToast('거절됨');rCashier(document.getElementById('tab-cashier'));
}
function csDir(type){
  const name=document.getElementById('csStu').value;

  if(!raw||raw<=0){showToast('금액을 입력해주세요.');return;}

    st.bal=parseFloat((st.bal+raw).toFixed(2));st.dep0=(st.dep0||0)+raw;

  <div class="flex gap2">

  // 6. 비밀번호 관리
  h+=`<div class="card"><div class="ct">🔑 비밀번호 관리</div>
  <div class="tst">학생 비밀번호 초기화</div>

function tchNews(){
  if(isWE()){showToast('주말에는 뉴스를 발행할 수 없습니다.');return;}
  STOCKS.forEach(s=>{
    const sel=document.getElementById('nS-'+s.id);
    const idx=sel?.value,pool=NP[s.id];
    const ni=idx!==''?pool[parseInt(idx)]:null; // null이면 runMarket에서 자동/이슈 처리
    if(ni){
      // 수동 선택된 뉴스로 직접 처리
      const mode=(()=>{const m={normal:{max:0.015,bias:0},bull:{max:0.02,bias:0.004},bear:{max:0.02,bias:-0.004},flat:{max:0.005,bias:0},surge:{max:0.06,bias:0.03},crash:{max:0.07,bias:-0.04}};return m[state.marketMode||'normal']||m.normal;})();
      let c=(Math.random()*mode.max*2-mode.max)+mode.bias;
      if(ni.p) c=c*0.6+Math.abs(c)*0.4; else c=c*0.6-Math.abs(c)*0.4;
      c=c-0.0005;
      const prev=state.stocks[s.id].price;
      const np=Math.max(1,parseFloat((prev*(1+c)).toFixed(2)));
      state.stocks[s.id].price=np;
      state.stocks[s.id].history.push(np);
      if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
      state.news.unshift({sid:s.id,t:ni.t,p:ni.p,date:dStr(),price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    }
  });
  // 수동 미선택 종목은 runMarket 방식으로
  const allManual=STOCKS.every(s=>{const sel=document.getElementById('nS-'+s.id);return sel&&sel.value!=='';});
  if(!allManual){
    // 미선택 종목만 자동처리 — lastMD 리셋 후 runMarket
    const prevMD=state.lastMD;
    state.lastMD=null;
    runMarket();
    state.lastMD=kst().toDateString();
  } else {
    state.lastMD=kst().toDateString();
  }
  if(state.news.length>60) state.news=state.news.slice(0,60);
  ss();showToast('뉴스 발행 완료!');rTeacher(document.getElementById('tab-teacher'));
}

function addTeacherIssue(){
  if(!state.teacherIssues) state.teacherIssues=[];
  let added=0;
  STOCKS.forEach(s=>{
    const txt=document.getElementById('issue-'+s.id)?.value?.trim();
    const p=document.getElementById('issueType-'+s.id)?.value==='true';
    if(txt){
      state.teacherIssues.push({sid:s.id,text:txt,p,used:false});
      added++;
    }
  });
  if(!added){showToast('이슈 내용을 입력해주세요.');return;}
  ss();showToast(`이슈 ${added}건 등록 완료! 다음 뉴스 발행 시 반영됩니다.`);
  rTeacher(document.getElementById('tab-teacher'));
}

function setMarketMode(mode){
  state.marketMode=mode;ss();
  const labels={normal:'일반장',bull:'상승장',bear:'하락장',flat:'보합장',surge:'급상승장',crash:'폭락장'};
  showToast(`시장 분위기: ${labels[mode]} 설정 완료!`);
  rTeacher(document.getElementById('tab-teacher'));
}

function setSellFee(){
  const v=parseFloat(document.getElementById('newFee').value);
  if(isNaN(v)||v<0){showToast('올바른 수수료를 입력해주세요.');return;}
  state.sellFee=v;ss();showToast(`매도 수수료: 주당 ${v}유로로 변경!`);
  rTeacher(document.getElementById('tab-teacher'));
}

function bulkDeposit(){
  const amt=parseFloat(document.getElementById('bulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  openModal('일괄 입금 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게 1인당 <strong>${fE(amt)}</strong>를 입금합니다.</p>`,[
    {l:'입금',c:'bsuc',f:()=>{
      let cnt=0;
      STUDENTS.forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return; // 투자 기록 없으면 제외
        st.bal=parseFloat((st.bal+amt).toFixed(2));
        st.dep0=(st.dep0||0)+amt;
        addTxLog('deposit',s.name,amt,cu.name,'일괄 입금');
        cnt++;
      });
      ss();showToast(`${cnt}명에게 일괄 입금 완료!`);closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function bulkWithdraw(){
  const amt=parseFloat(document.getElementById('bulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  const withdrawAmt=Math.round(amt);
  openModal('일괄 회수 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게서 1인당 <strong>${fE(withdrawAmt)}</strong>를 회수합니다. 잔액 부족한 학생은 제외됩니다.</p>`,[
    {l:'회수',c:'bdan',f:()=>{
      let cnt=0,skip=0;
      STUDENTS.forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return;
        if(st.bal<withdrawAmt){skip++;return;}
        st.bal=parseFloat((st.bal-withdrawAmt).toFixed(2));
        st.dep0=Math.max(0,(st.dep0||0)-withdrawAmt);
        addTxLog('withdraw',s.name,withdrawAmt,cu.name,'일괄 회수');
        cnt++;
      });
      ss();showToast(`${cnt}명 회수 완료${skip>0?` (잔액부족 ${skip}명 제외)`:''}`);closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function tchResetPw(){
  const n=document.getElementById('rPwS').value;delete state.passwords[n];ss();showToast(`${n} 비밀번호 초기화`);
}
function chgTPw(){
  const pw=document.getElementById('nTPw').value;
  if(!/^\d{4}$/.test(pw)){showToast('4자리 숫자만');return;}
  state.teacherPw=pw;ss();showToast('선생님 비밀번호 변경!');document.getElementById('nTPw').value='';
}
function chgCs(){
  const n=document.getElementById('nCs').value;state.cashierName=n;ss();

function chgPolice(){
  const p1=document.getElementById('nPolice1').value;
  const p2=document.getElementById('nPolice2').value;
  if(p1===p2){showToast('같은 학생을 두 번 선택할 수 없습니다.');return;}
  state.police=[p1,p2];ss();
  showToast(`경찰: ${p1}, ${p2} 설정 완료!`);
  rTeacher(document.getElementById('tab-teacher'));
}
function chgVice(){
  const v1=document.getElementById('nVice1').value;
  const v2=document.getElementById('nVice2').value;
  if(v1===v2){showToast('같은 학생을 두 번 선택할 수 없습니다.');return;}
  state.viceTeachers=[v1,v2];ss();
  showToast(`부담임: ${v1}, ${v2} 설정 완료!`);
  rTeacher(document.getElementById('tab-teacher'));
}
function resetAll(){
  openModal('초기화 확인','<p class="tsm">주가·뉴스를 초기화하고 30일 시뮬레이션을 재실행합니다. 학생 잔액·보유 주식은 유지됩니다.</p>',[
    {l:'초기화',c:'bdan',f:()=>{
      const{h,news}=sim30();
      STOCKS.forEach(s=>{state.stocks[s.id].price=h[s.id][h[s.id].length-1];state.stocks[s.id].history=h[s.id];state.stocks[s.id].start=100;});
      state.news=news;state.lastMD=null;ss();showToast('초기화 완료!');closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

// ── MODAL / TOAST
function openModal(title,body,acts){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  const ae=document.getElementById('mActs');ae.innerHTML='';
  acts.forEach(a=>{const b=document.createElement('button');b.className=`btn ${a.c}`;b.textContent=a.l;b.style.flex='1';b.onclick=a.f;ae.appendChild(b);});
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
