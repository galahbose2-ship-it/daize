<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIZE 투자 교실</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
  :root{
    --primary:#1a56db;--pl:#e8f0fe;--suc:#0e9f6e;--sl:#def7ec;
    --dan:#e02424;--dl:#fde8e8;--warn:#c27803;--wl:#fdf6b2;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g500:#6b7280;--g700:#374151;--g900:#111827;
    --r:12px;--sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--g900);min-height:100vh;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .lcard{background:white;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 4px 6px rgba(0,0,0,.07);}
  .llogo{text-align:center;margin-bottom:2rem;}
  .llogo h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;color:var(--primary);}
  .llogo p{color:var(--g500);font-size:.83rem;margin-top:.2rem;}
  .fg{margin-bottom:.9rem;}
  .fg label{display:block;font-size:.78rem;font-weight:500;color:var(--g700);margin-bottom:.35rem;}
  .fg select,.fg input{width:100%;padding:.6rem .85rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;outline:none;transition:border-color .2s;}
  .fg select:focus,.fg input:focus{border-color:var(--primary);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:.58rem 1rem;border-radius:10px;border:none;font-size:.86rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
  .bp{background:var(--primary);color:white;}.bp:hover{background:#1648c4;}
  .bs{background:var(--g100);color:var(--g700);}.bs:hover{background:var(--g200);}
  .bsuc{background:var(--suc);color:white;}.bsuc:hover{background:#0a8c60;}
  .bdan{background:var(--dan);color:white;}.bdan:hover{background:#c41f1f;}
  .bsm{padding:.33rem .72rem;font-size:.76rem;}
  .bfull{width:100%;}
  #appScreen{display:none;min-height:100vh;flex-direction:column;}
  .topbar{background:white;border-bottom:1px solid var(--g200);padding:0 1.4rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .tlogo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--primary);}
  .nav-tabs{display:flex;background:white;border-bottom:1px solid var(--g200);padding:0 .8rem;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nt{padding:.65rem .95rem;font-size:.8rem;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
  .nt.active{color:var(--primary);border-bottom-color:var(--primary);}
  .nt:hover:not(.active){color:var(--g700);}
  .mc{padding:1.1rem;max-width:860px;margin:0 auto;width:100%;}
  .tc{display:none;}.tc.active{display:block;}
  .card{background:white;border-radius:var(--r);padding:1.1rem;box-shadow:var(--sh);margin-bottom:.85rem;}
  .ct{font-size:.9rem;font-weight:700;color:var(--g900);margin-bottom:.85rem;display:flex;align-items:center;gap:.4rem;}
  .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.85rem;}
  .si{background:var(--g50);border-radius:10px;padding:.8rem;text-align:center;}
  .sl{font-size:.68rem;color:var(--g500);margin-bottom:.2rem;}
  .sv{font-size:1rem;font-weight:700;}
  /* PnL Banner */
  .pb{border-radius:12px;padding:.85rem 1rem;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
  .pb.pos{background:#f0fdf4;border:1.5px solid #6ee7b7;}
  .pb.neg{background:#fef2f2;border:1.5px solid #fca5a5;}
  .pb.neu{background:var(--g50);border:1.5px solid var(--g200);}
  .pb-label{font-size:.75rem;color:var(--g700);margin-bottom:.12rem;}
  .pb-amt{font-size:1.25rem;font-weight:700;}
  .pb-pct{font-size:.77rem;font-weight:600;margin-top:.08rem;}
  /* Stock card */
  .sc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.85rem;margin-bottom:.6rem;}
  .sch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.55rem;}
  .scn{font-weight:700;font-size:.92rem;}
  .scp{text-align:right;}
  .scpv{font-size:1.05rem;font-weight:700;}
  .bdg{display:inline-block;padding:.14rem .5rem;border-radius:6px;font-size:.68rem;font-weight:500;}
  .bsemi{background:#dbeafe;color:#1e40af;}.bfood{background:#dcfce7;color:#166534;}.bent{background:#fce7f3;color:#9d174d;}
  .pnl-row{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.5rem;}
  .pnl-cell{border-radius:8px;padding:.42rem .65rem;}
  .pnl-cell-neu{background:var(--g50);}
  .pnl-cell-pos{background:#f0fdf4;}
  .pnl-cell-neg{background:#fef2f2;}
  /* News */
  .ni{padding:.62rem;border-left:3px solid var(--primary);background:var(--pl);border-radius:0 8px 8px 0;margin-bottom:.45rem;}
  .ni-title{font-size:.83rem;font-weight:500;}
  .ni-meta{font-size:.68rem;color:var(--g500);margin-top:.12rem;}
  /* Trade */
  .tr-row{display:flex;gap:.45rem;align-items:flex-end;flex-wrap:wrap;margin-top:.6rem;}
  .tr-row .fg{flex:1;min-width:100px;margin-bottom:0;}
  /* Rank */
  .ri{display:flex;align-items:center;gap:.85rem;padding:.65rem;border-radius:10px;margin-bottom:.4rem;background:var(--g50);}
  .rn{font-size:.95rem;font-weight:700;min-width:24px;text-align:center;}
  .rn.gold{color:#d97706;}.rn.silver{color:#6b7280;}.rn.bronze{color:#92400e;}
  .ri-info{flex:1;}
  .ri-name{font-weight:600;font-size:.85rem;}
  .ri-sub{font-size:.72rem;color:var(--g500);}
  .ri-ret{font-size:.88rem;font-weight:700;margin-left:auto;}
  /* Deposit */
  .dc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.85rem;margin-bottom:.5rem;}
  .dch{display:flex;justify-content:space-between;align-items:flex-start;}
  .dct{font-weight:600;font-size:.85rem;}
  .dcr{font-size:.75rem;color:var(--suc);font-weight:500;}
  .dcd{font-size:.68rem;color:var(--g500);margin-top:.12rem;}
  /* Company */
  .co{border:1.5px solid var(--g200);border-radius:var(--r);padding:.95rem;margin-bottom:.6rem;}
  .co-hd{display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem;}
  .co-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
  .co-nm{font-weight:700;font-size:.92rem;}
  .co-desc{font-size:.8rem;color:var(--g700);line-height:1.75;margin-bottom:.6rem;}
  .co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;}
  .co-st{background:var(--g50);border-radius:8px;padding:.5rem .65rem;text-align:center;}
  .co-stl{font-size:.65rem;color:var(--g500);margin-bottom:.12rem;}
  .co-stv{font-size:.85rem;font-weight:700;}
  /* Cashier / Teacher */
  .cr{border:1px solid var(--g200);border-radius:10px;padding:.7rem .85rem;margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;}
  .ci{flex:1;}.cn{font-weight:600;}.cd{color:var(--g500);font-size:.72rem;}
  .ca{display:flex;gap:.32rem;}
  .tst{font-size:.8rem;font-weight:600;color:var(--g700);margin-bottom:.6rem;padding-bottom:.32rem;border-bottom:1px solid var(--g200);}
  .stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.4rem;}
  .sti{background:var(--g50);border-radius:8px;padding:.6rem .8rem;font-size:.78rem;}
  /* Modal */
  .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem;}
  .mo.open{display:flex;}
  .mi{background:white;border-radius:16px;padding:1.3rem;width:100%;max-width:370px;max-height:90vh;overflow-y:auto;}
  .mi-t{font-size:.92rem;font-weight:700;margin-bottom:.85rem;}
  .mi-a{display:flex;gap:.45rem;margin-top:.85rem;}
  /* Toast */
  #toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);background:var(--g900);color:white;padding:.52rem 1rem;border-radius:20px;font-size:.8rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  /* Utils */
  .mt1{margin-top:.45rem;}.mt2{margin-top:.9rem;}
  .flex{display:flex;}.gap2{gap:.45rem;}.jb{justify-content:space-between;}.ac{align-items:center;}
  .tsm{font-size:.79rem;}.txs{font-size:.7rem;}.fb{font-weight:700;}.tr{text-align:right;}
  .tg{color:var(--g500);}.tp{color:var(--primary);}.tsuc{color:var(--suc);}.tdan{color:var(--dan);}
  .div{border:none;border-top:1px solid var(--g200);margin:.85rem 0;}
  .empty{text-align:center;color:var(--g500);font-size:.8rem;padding:1.4rem;}
  .pbg{background:var(--wl);color:var(--warn);border-radius:999px;padding:.08rem .48rem;font-size:.68rem;font-weight:600;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  @media(max-width:480px){.sg{grid-template-columns:1fr 1fr;}.mc{padding:.85rem .7rem;}.topbar{padding:0 .85rem;}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#f0f4f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:#1a56db;margin-bottom:1rem;">DAIZE 투자시스템</div>
  <div style="font-size:.85rem;color:#6b7280;margin-bottom:2rem;">한결초등학교 다이제국 전용</div>
  <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;"></div>

</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<!-- 주말 배너 -->
<div id="weekendBanner" style="display:none;background:#fdf6b2;color:#c27803;text-align:center;padding:.6rem;font-size:.85rem;font-weight:500;position:sticky;top:52px;z-index:90;">
  📅 주말에는 시장이 열리지 않습니다. 평일(월~금)에 거래해 주세요.
</div>

<div id="loginScreen" style="display:none;">
  <div class="lcard">
    <div class="llogo"><h1>DAIZE 투자시스템 1.0</h1><p>한결초등학교 다이제국 전용</p></div>
    <div class="fg"><label>로그인 유형</label>
      <select id="loginType" onchange="updateLoginForm()">
        <option value="student">학생</option><option value="teacher">선생님</option>
      </select>
    </div>
    <div id="stuFields">
      <div class="fg"><label>이름 선택</label><select id="stuSel"></select></div>
      <div class="fg"><label>비밀번호 (4자리)</label><input type="password" id="stuPw" maxlength="4" placeholder="4자리 비밀번호"/></div>
    </div>
    <div id="tchFields" style="display:none;">
      <div class="fg"><label>선생님 비밀번호</label><input type="password" id="tchPw" placeholder="비밀번호 입력"/></div>
    </div>
    <button class="btn bp bfull" style="margin-top:.4rem;" onclick="doLogin()" disabled>로그인</button>
    <div style="text-align:center;color:var(--g500);font-size:.75rem;margin:.85rem 0;">— 또는 —</div>
    <button class="btn bs bfull" onclick="showSetPwModal()" disabled>비밀번호 처음 설정</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.7rem;">
      <div class="tlogo">DAIZE 투자시스템</div>
      <div style="font-size:.8rem;color:var(--g700);" id="topbarUser"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.45rem;">
      <span style="font-size:.68rem;color:var(--g500);" id="dateDisp"></span>
      <button class="btn bs bsm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="mc" id="mainContent"></div>
</div>

<div class="mo" id="modalOverlay">
  <div class="mi">
    <div class="mi-t" id="mTitle"></div>
    <div id="mBody"></div>
    <div class="mi-a" id="mActs"></div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
const STUDENTS=[
  {no:1,name:'강이준'},{no:2,name:'구나혜'},{no:3,name:'김다해'},{no:4,name:'김시환'},

  {id:'food',name:'DAIZE 식품',  sector:'식품',  badge:'bfood',emoji:'🍱',color:'#166534',bg:'#dcfce7'},
  {id:'ent', name:'DAIZE 엔터',  sector:'엔터',  badge:'bent', emoji:'🎵',color:'#9d174d',bg:'#fce7f3'}
];
const CO_INFO={
  semi:{
    fullName:'DAIZE 반도체 주식회사',
    desc:`DAIZE 반도체는 스마트폰, 컴퓨터, 텔레비전 등 거의 모든 전자 제품 안에 들어가는 아주 작은 부품인 '반도체 칩'을 만드는 회사예요.\n\n쌀알보다도 훨씬 작은 이 칩 안에 수십억 개의 아주 작은 스위치가 들어 있어서, 기계가 계산하고 생각하고 기억할 수 있게 해 줘요. 마치 사람의 뇌 역할을 하는 거랍니다.\n\n최근에는 AI(인공지능)가 크게 유행하면서, AI가 학습하고 생각하는 데 필요한 특수 칩의 수요가 전 세계에서 폭발적으로 늘고 있어요. 전 세계 IT 회사들이 DAIZE 반도체의 칩을 사기 위해 줄을 서고 있답니다!`,
    ceo:'김철수', employees:'4,800명', founded:'2001년'
  },
  food:{
    fullName:'DAIZE 식품 주식회사',
    desc:`DAIZE 식품은 라면, 냉동식품, 과자, 음료 등 맛있는 먹거리를 만드는 회사예요. 우리가 편의점이나 마트에서 자주 보는 식품들이 DAIZE 식품에서 나온답니다.\n\n특히 한국 음식(K-푸드)이 전 세계적으로 인기를 끌면서, 동남아시아와 미국, 유럽에서도 DAIZE 식품 제품을 즐겨 먹고 있어요. 라면 하나가 외국에서 선물로 인기 있을 정도예요!\n\n건강에 관심이 높아지면서 칼로리를 줄인 제품이나 채소로 만든 식품도 열심히 개발하고 있어요. 간편하면서도 건강하게 먹고 싶은 사람들에게 꼭 필요한 회사랍니다.`,
    ceo:'박민정', employees:'3,200명', founded:'1995년'
  },
  ent:{
    fullName:'DAIZE 엔터테인먼트 주식회사',
    desc:`DAIZE 엔터테인먼트는 가수, 배우, 유튜버 등 연예인을 발굴하고 키워내는 회사예요. 우리가 좋아하는 K팝 아이돌 그룹이 여기서 탄생하기도 해요!\n\n이 회사는 음악 제작, 콘서트 기획, 드라마·영화 제작까지 다양한 사업을 해요. K팝은 이제 전 세계 팬들이 열광하는 문화가 됐어요. 미국 빌보드 차트에 오르거나, 유럽·남미에서 콘서트를 열면 수만 명이 모여들어요.\n\n요즘은 음악 스트리밍, 팬덤 앱, 굿즈(가수 관련 상품) 판매로도 큰 수익을 올려요. 팬이 많아질수록 회사 가치도 높아지는 구조랍니다.`,
    ceo:'이지영', employees:'1,600명', founded:'2008년'
  }
};

const NP={
  semi:[
    {t:'AI 반도체 수요 급증…글로벌 빅테크 주문 쇄도',p:true},{t:'미국 對中 반도체 수출 규제 강화 발표',p:false},
    {t:'DAIZE 반도체, 3nm 공정 개발 성공 발표',p:true},{t:'삼성·SK 등 경쟁사 대규모 증설 계획 공개',p:false},

    {t:'HBM4 규격 표준화…D램 시장 확대 기대',p:true},{t:'전기차 캐즘으로 차량용 반도체 수요 감소',p:false},
    {t:'DAIZE 반도체, 엔비디아와 장기 공급 계약 체결',p:true},{t:'국내 전력 공급 불안…반도체 공장 일시 가동 중단',p:false},
    {t:'EU 반도체법 시행으로 유럽 수요 회복 기대',p:true},{t:'글로벌 경기 둔화 우려…IT 투자 축소 전망',p:false},
    {t:'DAIZE 반도체 1분기 영업이익 시장 기대치 상회',p:true},{t:'원·달러 환율 급등…수출 실적 개선 전망',p:true},

// 30-day pre-sim
function sim30(){
  const h={semi:[100],food:[100],ent:[100]},news=[];
  for(let d=0;d<30;d++){
    const big=(d===14||d===29);
    STOCKS.forEach(s=>{
      const pool=NP[s.id],ni=pool[Math.floor(Math.random()*pool.length)];
      let mc=big?0.10:0.03,c=(Math.random()*mc*2)-mc;
      if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
      const prev=h[s.id][h[s.id].length-1];
      const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
      h[s.id].push(np);
      news.unshift({sid:s.id,t:ni.t,p:ni.p,date:`${30-d}일 전`,price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    });
  }
  return{h,news:news.slice(0,60)};
}

function runMarket(){
  if(!state) return; // state 로드 전 방어
  if(isWE()) return; // 주말 장 마감
  const td=kst().toDateString();
  if(state.lastMD===td) return;
  state.lastMD=td; state.dayCount++;
  const big=(state.dayCount%22===0);
  STOCKS.forEach(s=>{
    const pool=NP[s.id],ni=pool[Math.floor(Math.random()*pool.length)];
    let mc=big?0.10:0.03,c=(Math.random()*mc*2)-mc;
    if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
    const prev=state.stocks[s.id].price;
    const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
    state.stocks[s.id].price=np;
    state.stocks[s.id].history.push(np);
    if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
    state.news.unshift({sid:s.id,t:ni.t,p:ni.p,date:dStr(),price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
  });
  if(state.news.length>60) state.news=state.news.slice(0,60);
  const now=kst();
  STUDENTS.forEach(s=>{
    const st=state.students[s.name];
    if(!st||!st.deps) return;
    st.deps.forEach(dep=>{
      if(!dep.done&&!dep.er&&new Date(dep.md)<=now){
        dep.done=true;
        const int=Math.round(dep.amt*dep.rate*dep.mon);
        const tax=Math.round(int*0.01);
        st.bal=parseFloat((st.bal+dep.amt+int-tax).toFixed(2));
        dep.ret=dep.amt+int-tax; dep.tax=tax;
      }
    });
  });
  ss();
}

// Cost basis
function updateCB(name,sid,qty,price,buy){
  const st=state.students[name];
  if(!st.cb) st.cb={semi:0,food:0,ent:0};
  if(buy){
    const cq=st.hld[sid]||0,cc=st.cb[sid]||0;
    st.cb[sid]=cq+qty>0?(cc*cq+price*qty)/(cq+qty):0;
  } else {
    if((st.hld[sid]||0)-qty<=0) st.cb[sid]=0;
  }
}

// Calc portfolio
function calcP(name){
  // students 데이터 없으면 기본값 반환
  if(!state.students) state.students={};
  if(!state.students[name])
    state.students[name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0}};
  const st=state.students[name];
  if(!st.hld) st.hld={semi:0,food:0,ent:0};
  if(!st.cb)  st.cb={semi:0,food:0,ent:0};
  if(!st.deps) st.deps=[];
  if(!state.stocks) return{st,sv:0,total:st.bal||0,inv:st.dep0||0,tpnl:-(st.dep0||0),tpct:0,sd:[],dl:0};
  let sv=0;
  const sd=STOCKS.map(s=>{
    const q=st.hld[s.id]||0,cp=state.stocks[s.id].price,ac=st.cb[s.id]||0;
    const val=q*cp,cost=q*ac,pnl=val-cost,pct=cost>0?(pnl/cost*100):0;
    sv+=val;
    return{s,q,cp,ac,val,cost,pnl,pct};
  });
  const dl=(st.deps||[]).filter(d=>!d.done&&!d.er).reduce((a,d)=>a+d.amt,0);
  const total=st.bal+sv+dl,inv=st.dep0||0;
  const tpnl=total-inv,tpct=inv>0?(tpnl/inv*100):0;
  return{st,sv,total,inv,tpnl,tpct,sd,dl};
}

    const chg=stk.price-prev,pct=(chg/prev*100).toFixed(2),isUp=chg>=0;
    const f30=((stk.price-(stk.start||100))/(stk.start||100)*100).toFixed(1);
    h+=`<div class="sc">
      <div class="sch">
        <div><div class="scn">${s.emoji} ${s.name}</div><span class="bdg ${s.badge}">${s.sector}</span></div>

        </div>
      </div>
      <div style="height:58px;margin-top:.4rem;">${miniChart(hist,isUp)}</div>
    </div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function miniChart(history,isUp){
  const data=history.slice(-31);if(data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data);
  const w=300,h=50,rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;"><polyline points="${pts}" fill="none" stroke="${isUp?'#0e9f6e':'#e02424'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

      </div>
      <div class="txs tg mt1">최대 ${Math.floor(st.bal/stk.price)}주 매수 | 매도 수수료 주당 1유로</div>

function exTrade(sid,action){
  if(isWE()){showToast('주말에는 거래가 불가능합니다. 📅');return;}
  const st=state.students[cu.name],stk=state.stocks[sid];
  const qty=parseInt(document.getElementById('q-'+sid)?.value||0);
  if(!qty||qty<=0){showToast('수량을 입력해주세요.');return;}
  const sn=STOCKS.find(s=>s.id===sid).name;
  if(action==='buy'){
    const cost=qty*stk.price;
    if(cost>st.bal){showToast('투자 가능 금액이 부족합니다!');return;}
    updateCB(cu.name,sid,qty,stk.price,true);
    st.bal=parseFloat((st.bal-cost).toFixed(2));
    st.hld[sid]=(st.hld[sid]||0)+qty;
    showToast(`${sn} ${qty}주 매수! (-${fE2(cost)})`);
  } else {
    const held=st.hld[sid]||0;
    if(qty>held){showToast(`보유 주식 부족 (보유: ${held}주)`);return;}
    const fee=qty*1,proc=qty*stk.price-fee;
    if(proc<0){showToast('수수료가 매도금액보다 큽니다.');return;}
    updateCB(cu.name,sid,qty,stk.price,false);
    st.bal=parseFloat((st.bal+proc).toFixed(2));
    st.hld[sid]-=qty;
    showToast(`${sn} ${qty}주 매도! (+${fE2(proc)}, 수수료 ${fE2(fee)})`);
  }
  ss();rTrade(document.getElementById('tab-trade'));
}

  const pnd=(state.pd||[]).filter(r=>r.st==='pending');
  const txLog=state.txLog||[];
  let h=`<div class="card"><div class="ct">💼 입출금 관리 — 은행장 / 선생님 전용</div>`;
  if(pnd.length){
    h+=`<div class="tst">대기 중인 요청 <span class="pbg">${pnd.length}</span></div>`;
    pnd.forEach(r=>{
      h+=`<div class="cr">
        <div class="ci"><div class="cn">${r.to} · ${r.type==='deposit'?'📥 입금':'📤 출금'} 요청</div>
        <div class="cd">${fE(r.amt)} · ${r.date}</div></div>
        <div class="ca">
          <button class="btn bsuc bsm" onclick="appC(${r.id})">승인</button>
          <button class="btn bdan bsm" onclick="rejC(${r.id})">거절</button>
        </div>
      </div>`;
    });
  } else h+=`<div class="empty">대기 중인 요청 없음</div>`;
  h+=`</div>`;
  h+=`<div class="card"><div class="ct">➕ 직접 입출금 처리</div>
  <p class="txs tg" style="margin-bottom:.55rem;">출금 금액은 소수점 이하 반올림됩니다.</p>
  <div class="fg"><label>학생 선택</label><select id="csStu">${STUDENTS.map(s=>`<option value="${s.name}">${s.no}번 ${s.name}</option>`).join('')}</select></div>
  <div class="fg"><label>금액 (유로)</label><input type="number" id="csAmt" min="1" step="1" placeholder="금액 입력"/></div>
  <div class="flex gap2 mt1">
    <button class="btn bsuc bsm" onclick="csDir('deposit')">입금 처리</button>
    <button class="btn bdan bsm" onclick="csDir('withdraw')">출금 처리</button>
  </div></div>`;

  // 입출금 기록
  h+=`<div style="text-align:center;margin-bottom:.7rem;">
    <button class="btn bs bsm" onclick="toggleTxLog()">📋 ${showTxLog?'입출금 기록 접기':'입출금 기록 보기'} (총 ${txLog.length}건)</button>
  </div>`;
  if(showTxLog){
    h+=`<div class="card"><div class="ct">📋 입출금 기록</div>`;
    if(!txLog.length){h+=`<div class="empty">기록이 없습니다.</div>`;}
    else{
      h+=`<div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:.75rem;">
          <thead><tr style="background:var(--g50);">
            <th style="padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--g200);">날짜</th>
            <th style="padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--g200);">구분</th>
            <th style="padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--g200);">학생</th>
            <th style="padding:.4rem .6rem;text-align:right;border-bottom:1px solid var(--g200);">금액</th>
            <th style="padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--g200);">처리자</th>
            <th style="padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--g200);">비고</th>
          </tr></thead><tbody>`;
      txLog.forEach(tx=>{
        const isIn=tx.type==='deposit';
        h+=`<tr style="border-bottom:1px solid var(--g200);">
          <td style="padding:.38rem .6rem;color:var(--g500);">${tx.date}</td>
          <td style="padding:.38rem .6rem;font-weight:600;color:${isIn?'var(--suc)':'var(--dan)'};">${isIn?'📥 입금':'📤 출금'}</td>
          <td style="padding:.38rem .6rem;">${tx.name}</td>
          <td style="padding:.38rem .6rem;text-align:right;font-weight:600;">${fE(tx.amt)}</td>
          <td style="padding:.38rem .6rem;color:var(--g500);">${tx.by}</td>
          <td style="padding:.38rem .6rem;color:var(--g500);">${tx.note}</td>
        </tr>`;
      });
      h+=`</tbody></table></div>`;
    }
    h+=`</div>`;
  }
  el.innerHTML=h;
}
function toggleTxLog(){
  showTxLog=!showTxLog;
  const el=document.getElementById('tab-cashier');
  if(el&&el.classList.contains('active')) rCashier(el);
}
function appC(id){
  const req=state.pd.find(r=>r.id===id);if(!req)return;
  const st=state.students[req.to];
  if(req.type==='deposit'){
    st.bal=parseFloat((st.bal+req.amt).toFixed(2));st.dep0=(st.dep0||0)+req.amt;
    addTxLog('deposit',req.to,req.amt,cu.name,'요청 승인');
  } else {
    const amt=Math.round(req.amt);
    if(st.bal<amt){showToast('투자 가능 금액 부족');return;}
    st.bal=parseFloat((st.bal-amt).toFixed(2));st.dep0=Math.max(0,(st.dep0||0)-amt);
    addTxLog('withdraw',req.to,amt,cu.name,'요청 승인');
  }
  req.st='approved';ss();showToast(`${req.to} ${req.type==='deposit'?'입금':'출금'} 승인!`);
  rCashier(document.getElementById('tab-cashier'));
}
function rejC(id){
  const req=state.pd.find(r=>r.id===id);if(!req)return;
  addTxLog('reject',req.to,req.amt,cu.name,'요청 거절');
  req.st='rejected';ss();showToast('거절됨');rCashier(document.getElementById('tab-cashier'));
}
function csDir(type){
  const name=document.getElementById('csStu').value;
  const raw=parseFloat(document.getElementById('csAmt').value);
  if(!raw||raw<=0){showToast('금액을 입력해주세요.');return;}
  const st=state.students[name];
  if(type==='deposit'){
    st.bal=parseFloat((st.bal+raw).toFixed(2));st.dep0=(st.dep0||0)+raw;
    addTxLog('deposit',name,raw,cu.name,'직접 입금');
    showToast(`${name}에게 ${fE(raw)} 입금!`);
  } else {
    const amt=Math.round(raw);
    if(st.bal<amt){showToast('투자 가능 금액 부족');return;}
    st.bal=parseFloat((st.bal-amt).toFixed(2));st.dep0=Math.max(0,(st.dep0||0)-amt);
    addTxLog('withdraw',name,amt,cu.name,'직접 출금');
    showToast(`${name}에서 ${fE(amt)} 출금!`);
  }
  ss();document.getElementById('csAmt').value='';
}

// ── TEACHER
function rTeacher(el){
  let h=`<div class="card"><div class="ct">📰 뉴스 발행 및 주가 업데이트</div>
  <p class="tsm tg" style="margin-bottom:.65rem;">비워두면 자동으로 뉴스를 선택합니다.</p>`;
  STOCKS.forEach(s=>{
    h+=`<div style="margin-bottom:.6rem;">
      <div class="tsm fb" style="margin-bottom:.22rem;">${s.emoji} ${s.name}</div>
      <select id="nS-${s.id}" style="width:100%;padding:.42rem .65rem;border:1px solid var(--g200);border-radius:8px;font-size:.78rem;font-family:inherit;">
        <option value="">자동 선택</option>
        ${NP[s.id].map((n,i)=>`<option value="${i}">[${n.p?'호재':'악재'}] ${n.t}</option>`).join('')}
      </select>
    </div>`;
  });
  h+=`<button class="btn bp bsm mt1" onclick="tchNews()">뉴스 발행 및 주가 업데이트</button></div>`;

  h+=`<div class="card"><div class="ct">🔑 비밀번호 관리</div>
  <div class="tst">학생 비밀번호 초기화</div>
  <div class="fg"><label>학생 선택</label><select id="rPwS">${STUDENTS.map(s=>`<option value="${s.name}">${s.no}번 ${s.name}</option>`).join('')}</select></div>
  <button class="btn bdan bsm" onclick="tchResetPw()">초기화</button>
  <div class="div"></div>
  <div class="tst">선생님 비밀번호 변경</div>
  <div class="fg"><label>새 비밀번호 (4자리)</label><input type="password" id="nTPw" maxlength="4" placeholder="4자리"/></div>
  <button class="btn bs bsm" onclick="chgTPw()">변경</button></div>`;

  h+=`<div class="card"><div class="ct">👤 은행장 설정</div>
  <p class="tsm tg" style="margin-bottom:.6rem;">현재 은행장: <strong>${state.cashierName}</strong></p>
  <div class="fg"><label>새 은행장</label><select id="nCs">${STUDENTS.map(s=>`<option value="${s.name}" ${s.name===state.cashierName?'selected':''}>${s.no}번 ${s.name}</option>`).join('')}</select></div>
  <button class="btn bp bsm" onclick="chgCs()">변경</button></div>`;

  h+=`<div class="card"><div class="ct">⚙️ 주가 초기화 (테스트용)</div>
  <p class="tsm tg" style="margin-bottom:.55rem;">주가와 뉴스를 초기화하고 30일 시뮬레이션을 재실행합니다.</p>
  <button class="btn bdan bsm" onclick="resetAll()">전체 초기화</button></div>`;

  h+=`<div class="card"><div class="ct">👥 전체 학생 현황</div><div class="stg">`;
  STUDENTS.forEach(s=>{
    const p=calcP(s.name),isP=p.tpnl>=0,hasPw=state.passwords[s.name]?'🔐':'🔓';
    h+=`<div class="sti">
      <div style="font-weight:600;">${s.no}번 ${s.name} ${hasPw}</div>
      <div class="txs tg">${fE(p.total)}</div>
      ${p.inv>0?`<div class="txs ${isP?'tsuc':'tdan'}">${isP?'+':''}${p.tpct.toFixed(1)}%</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;
  el.innerHTML=h;
}
function tchNews(){
  if(isWE()){showToast('주말에는 뉴스를 발행할 수 없습니다.');return;}
  STOCKS.forEach(s=>{
    const sel=document.getElementById('nS-'+s.id);
    const idx=sel?.value,pool=NP[s.id];
    const ni=idx!==''?pool[parseInt(idx)]:pool[Math.floor(Math.random()*pool.length)];
    let c=(Math.random()*0.06)-0.03;
    if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
    const prev=state.stocks[s.id].price;
    const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
    state.stocks[s.id].price=np;
    state.stocks[s.id].history.push(np);
    if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
    state.news.unshift({sid:s.id,t:ni.t,p:ni.p,date:dStr(),price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
  });
  state.lastMD=kst().toDateString();
  if(state.news.length>60)state.news=state.news.slice(0,60);
  ss();showToast('뉴스 발행 완료!');rTeacher(document.getElementById('tab-teacher'));
}
function tchResetPw(){
  const n=document.getElementById('rPwS').value;delete state.passwords[n];ss();showToast(`${n} 비밀번호 초기화`);
}
function chgTPw(){
  const pw=document.getElementById('nTPw').value;
  if(!/^\d{4}$/.test(pw)){showToast('4자리 숫자만');return;}
  state.teacherPw=pw;ss();showToast('선생님 비밀번호 변경!');document.getElementById('nTPw').value='';
}
function chgCs(){
  const n=document.getElementById('nCs').value;state.cashierName=n;ss();
  showToast(`투자관리자 → ${n}`);rTeacher(document.getElementById('tab-teacher'));
}
function resetAll(){
  openModal('초기화 확인','<p class="tsm">주가·뉴스를 초기화하고 30일 시뮬레이션을 재실행합니다. 학생 잔액·보유 주식은 유지됩니다.</p>',[
    {l:'초기화',c:'bdan',f:()=>{
      const{h,news}=sim30();
      STOCKS.forEach(s=>{state.stocks[s.id].price=h[s.id][h[s.id].length-1];state.stocks[s.id].history=h[s.id];state.stocks[s.id].start=100;});
      state.news=news;state.lastMD=null;ss();showToast('초기화 완료!');closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

// ── MODAL / TOAST
function openModal(title,body,acts){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  const ae=document.getElementById('mActs');ae.innerHTML='';
  acts.forEach(a=>{const b=document.createElement('button');b.className=`btn ${a.c}`;b.textContent=a.l;b.style.flex='1';b.onclick=a.f;ae.appendChild(b);});
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── type="module" 안의 함수를 HTML onclick/onchange에서 쓸 수 있도록 전역 노출
window.updateLoginForm=updateLoginForm;
window.doLogin=doLogin;

window.switchTab=switchTab;

window.reqCA=reqCA;
window.exTrade=exTrade;

window.earlyR=earlyR;
window.appC=appC;
window.rejC=rejC;

window.tchNews=tchNews;
window.tchResetPw=tchResetPw;
window.chgTPw=chgTPw;
window.chgCs=chgCs;
window.resetAll=resetAll;

window.toggleTxLog=toggleTxLog;
</script>
