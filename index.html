<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIZE 학급 운영 시스템</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
  :root{
    --primary:#1a56db;--pl:#e8f0fe;--suc:#0e9f6e;--sl:#def7ec;
    --dan:#e02424;--dl:#fde8e8;--warn:#c27803;--wl:#fdf6b2;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g500:#6b7280;--g700:#374151;--g900:#111827;
    --r:12px;--sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--g900);min-height:100vh;font-size:15px;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .lcard{background:white;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:440px;box-shadow:0 4px 6px rgba(0,0,0,.07);}
  .llogo{text-align:center;margin-bottom:2rem;}
  .llogo h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;color:var(--primary);}
  .llogo p{color:var(--g500);font-size:.9rem;margin-top:.2rem;}
  .fg{margin-bottom:.9rem;}
  .fg label{display:block;font-size:.85rem;font-weight:500;color:var(--g700);margin-bottom:.35rem;}
  .fg select,.fg input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--g200);border-radius:10px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s;}
  .fg select:focus,.fg input:focus{border-color:var(--primary);}
  /* 학생 이름 선택 그리드 */
  .student-grid-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;margin-bottom:.9rem;}
  .stu-btn{padding:.6rem .3rem;border:1.5px solid var(--g200);border-radius:10px;background:var(--g50);font-size:.88rem;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:var(--g700);line-height:1.5;}
  .stu-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
  .stu-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:.62rem 1rem;border-radius:10px;border:none;font-size:.92rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
  .bp{background:var(--primary);color:white;}.bp:hover{background:#1648c4;}
  .bs{background:var(--g100);color:var(--g700);}.bs:hover{background:var(--g200);}
  .bsuc{background:var(--suc);color:white;}.bsuc:hover{background:#0a8c60;}
  .bdan{background:var(--dan);color:white;}.bdan:hover{background:#c41f1f;}
  .bsm{padding:.35rem .75rem;font-size:.82rem;}
  .bfull{width:100%;}
  #appScreen{display:none;min-height:100vh;flex-direction:column;}
  .topbar{background:white;border-bottom:1px solid var(--g200);padding:0 1.4rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .tlogo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--primary);}
  .nav-tabs{display:flex;background:white;border-bottom:1px solid var(--g200);padding:0 .8rem;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nt{padding:.7rem 1rem;font-size:.85rem;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
  .nt.active{color:var(--primary);border-bottom-color:var(--primary);}
  .nt:hover:not(.active){color:var(--g700);}
  .mc{padding:1.1rem;max-width:860px;margin:0 auto;width:100%;}
  .tc{display:none;}.tc.active{display:block;}
  .card{background:white;border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh);margin-bottom:.9rem;}
  .ct{font-size:.97rem;font-weight:700;color:var(--g900);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
  .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.9rem;}
  .si{background:var(--g50);border-radius:10px;padding:.85rem;text-align:center;}
  .sl{font-size:.75rem;color:var(--g500);margin-bottom:.2rem;}
  .sv{font-size:1.05rem;font-weight:700;}
  /* PnL Banner */
  .pb{border-radius:12px;padding:.9rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
  .pb.pos{background:#f0fdf4;border:1.5px solid #6ee7b7;}
  .pb.neg{background:#fef2f2;border:1.5px solid #fca5a5;}
  .pb.neu{background:var(--g50);border:1.5px solid var(--g200);}
  .pb-label{font-size:.82rem;color:var(--g700);margin-bottom:.12rem;}
  .pb-amt{font-size:1.3rem;font-weight:700;}
  .pb-pct{font-size:.83rem;font-weight:600;margin-top:.08rem;}
  /* Stock card */
  .sc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.65rem;}
  .sch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;}
  .scn{font-weight:700;font-size:.97rem;}
  .scp{text-align:right;}
  .scpv{font-size:1.1rem;font-weight:700;}
  .bdg{display:inline-block;padding:.16rem .55rem;border-radius:6px;font-size:.74rem;font-weight:500;}
  .bsemi{background:#dbeafe;color:#1e40af;}.bfood{background:#dcfce7;color:#166534;}.bent{background:#fce7f3;color:#9d174d;}
  .pnl-row{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.5rem;}
  .pnl-cell{border-radius:8px;padding:.48rem .7rem;}
  .pnl-cell-neu{background:var(--g50);}
  .pnl-cell-pos{background:#f0fdf4;}
  .pnl-cell-neg{background:#fef2f2;}
  /* News */
  .ni{padding:.7rem;border-left:3px solid var(--primary);background:var(--pl);border-radius:0 8px 8px 0;margin-bottom:.5rem;}
  .ni-title{font-size:.9rem;font-weight:500;}
  .ni-meta{font-size:.75rem;color:var(--g500);margin-top:.14rem;}
  /* Trade */
  .tr-row{display:flex;gap:.45rem;align-items:flex-end;flex-wrap:wrap;margin-top:.6rem;}
  .tr-row .fg{flex:1;min-width:100px;margin-bottom:0;}
  /* Rank */
  .ri{display:flex;align-items:center;gap:.85rem;padding:.7rem;border-radius:10px;margin-bottom:.45rem;background:var(--g50);}
  .rn{font-size:1rem;font-weight:700;min-width:26px;text-align:center;}
  .rn.gold{color:#d97706;}.rn.silver{color:#6b7280;}.rn.bronze{color:#92400e;}
  .ri-info{flex:1;}
  .ri-name{font-weight:600;font-size:.9rem;}
  .ri-sub{font-size:.76rem;color:var(--g500);}
  .ri-ret{font-size:.92rem;font-weight:700;margin-left:auto;}
  /* Deposit */
  .dc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.55rem;}
  .dch{display:flex;justify-content:space-between;align-items:flex-start;}
  .dct{font-weight:600;font-size:.9rem;}
  .dcr{font-size:.8rem;color:var(--suc);font-weight:500;}
  .dcd{font-size:.73rem;color:var(--g500);margin-top:.13rem;}
  /* Company */
  .co{border:1.5px solid var(--g200);border-radius:var(--r);padding:1rem;margin-bottom:.65rem;}
  .co-hd{display:flex;align-items:center;gap:.7rem;margin-bottom:.65rem;}
  .co-ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
  .co-nm{font-weight:700;font-size:.97rem;}
  .co-desc{font-size:.86rem;color:var(--g700);line-height:1.8;margin-bottom:.65rem;}
  .co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;}
  .co-st{background:var(--g50);border-radius:8px;padding:.55rem .7rem;text-align:center;}
  .co-stl{font-size:.7rem;color:var(--g500);margin-bottom:.12rem;}
  .co-stv{font-size:.9rem;font-weight:700;}
  /* Cashier / Teacher */
  .cr{border:1px solid var(--g200);border-radius:10px;padding:.75rem .9rem;margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:center;font-size:.86rem;}
  .ci{flex:1;}.cn{font-weight:600;}.cd{color:var(--g500);font-size:.76rem;}
  .ca{display:flex;gap:.32rem;}
  .tst{font-size:.85rem;font-weight:600;color:var(--g700);margin-bottom:.65rem;padding-bottom:.35rem;border-bottom:1px solid var(--g200);}
  .stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.45rem;}
  .sti{background:var(--g50);border-radius:8px;padding:.65rem .85rem;font-size:.83rem;}
  /* Modal */
  .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem;}
  .mo.open{display:flex;}
  .mi{background:white;border-radius:16px;padding:1.4rem;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;}
  .mi-t{font-size:.97rem;font-weight:700;margin-bottom:.9rem;}
  .mi-a{display:flex;gap:.45rem;margin-top:.9rem;}
  /* Toast */
  #toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);background:var(--g900);color:white;padding:.56rem 1.1rem;border-radius:20px;font-size:.86rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  /* Version badge */
  .ver{position:fixed;bottom:.6rem;right:.8rem;font-size:.7rem;color:var(--g500);background:rgba(255,255,255,.8);padding:.15rem .5rem;border-radius:20px;z-index:50;}
  /* Utils */
  .mt1{margin-top:.5rem;}.mt2{margin-top:1rem;}
  .flex{display:flex;}.gap2{gap:.5rem;}.jb{justify-content:space-between;}.ac{align-items:center;}
  .tsm{font-size:.84rem;}.txs{font-size:.75rem;}.fb{font-weight:700;}.tr{text-align:right;}
  .tg{color:var(--g500);}.tp{color:var(--primary);}.tsuc{color:var(--suc);}.tdan{color:var(--dan);}
  .div{border:none;border-top:1px solid var(--g200);margin:.9rem 0;}
  .empty{text-align:center;color:var(--g500);font-size:.85rem;padding:1.5rem;}
  .pbg{background:var(--wl);color:var(--warn);border-radius:999px;padding:.1rem .5rem;font-size:.72rem;font-weight:600;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  @media(max-width:480px){.sg{grid-template-columns:1fr 1fr;}.mc{padding:.9rem .75rem;}.topbar{padding:0 .85rem;}.student-grid-sel{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#f0f4f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:#1a56db;margin-bottom:1rem;">DAIZE 투자시스템</div>
  <div style="font-size:.85rem;color:#6b7280;margin-bottom:2rem;">한결초등학교 다이제국 전용</div>
  <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div id="loadingMsg" style="font-size:.78rem;color:#6b7280;margin-top:1rem;">서버에 연결하는 중...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<!-- 주말 배너 -->
<div id="weekendBanner" style="display:none;background:#fdf6b2;color:#c27803;text-align:center;padding:.6rem;font-size:.85rem;font-weight:500;position:sticky;top:52px;z-index:90;">
  📅 주말에는 시장이 열리지 않습니다. 평일(월~금)에 거래해 주세요.
</div>

<div class="ver">v2.1</div>

<div id="loginScreen" style="display:none;">
  <div class="lcard">
    <div class="llogo">
      <img src="daize_logo.png" alt="DAIZE 로고" style="width:140px;margin-bottom:.5rem;" onerror="this.style.display='none'"/>
      <h1>DAIZE 학급 운영 시스템</h1>
      <p>한결초등학교 다이제국 전용</p>
    </div>
    <div class="fg"><label>로그인 유형</label>
      <select id="loginType" onchange="updateLoginForm()">
        <option value="student">학생</option><option value="teacher">선생님</option>
      </select>
    </div>
    <div id="stuFields">
      <div class="fg">
        <label>이름 선택</label>
        <input type="hidden" id="stuSel" value=""/>
        <div class="student-grid-sel" id="stuGrid"></div>
      </div>
      <div class="fg"><label>비밀번호</label><input type="password" id="stuPw" maxlength="12" placeholder="문자+숫자 조합" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <div id="tchFields" style="display:none;">
      <div class="fg"><label>선생님 비밀번호</label><input type="password" id="tchPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <button class="btn bp bfull" style="margin-top:.4rem;" onclick="doLogin()" disabled>로그인</button>
    <div style="text-align:center;color:var(--g500);font-size:.75rem;margin:.85rem 0;">— 또는 —</div>
    <button class="btn bs bfull" onclick="showSetPwModal()" disabled>비밀번호 처음 설정</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.7rem;">
      <img src="daize_logo.png" alt="" style="height:32px;" onerror="this.style.display='none'"/>
      <div class="tlogo">DAIZE 학급 운영</div>
      <div style="font-size:.8rem;color:var(--g700);" id="topbarUser"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.45rem;">
      <span style="font-size:.68rem;color:var(--g500);" id="dateDisp"></span>
      <span id="timerDisp" style="display:none;font-size:.75rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;background:#fef3c7;color:#92400e;"></span>
      <button class="btn bs bsm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="mc" id="mainContent"></div>
</div>

<div class="mo" id="modalOverlay">
  <div class="mi">
    <div class="mi-t" id="mTitle"></div>
    <div id="mBody"></div>
    <div class="mi-a" id="mActs"></div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
const STUDENTS=[
  {no:1,name:'강이준'},{no:2,name:'구나혜'},{no:3,name:'김다해'},{no:4,name:'김시환'},
  {no:5,name:'김은중'},{no:6,name:'김지유'},{no:7,name:'김태연'},{no:8,name:'류다현'},
  {no:9,name:'박승현'},{no:10,name:'박유성'},{no:11,name:'손서율'},{no:12,name:'신서윤'},
  {no:13,name:'양이든'},{no:14,name:'오윤재'},{no:15,name:'오은우'},{no:16,name:'유체정'},
  {no:17,name:'이학진'},{no:18,name:'장연두'},{no:19,name:'전하율'},{no:20,name:'조혜리'},
  {no:21,name:'최은재'},{no:22,name:'허남희'},{no:23,name:'황동현'},{no:30,name:'김승언'}
];
const TEST_ACCOUNTS=['김승언']; // 테스트 계정 — 순위/순찰/과제에서 제외
// 실제 학생 목록 (테스트 계정 + 동적 추가/삭제 반영)
function realStudents(){
  const base=STUDENTS.filter(s=>!TEST_ACCOUNTS.includes(s.name));
  const extra=(state&&state.extraStudents)||[];
  const removed=(state&&state.removedStudents)||[];
  return [...base,...extra].filter(s=>!removed.includes(s.name));
}
const STOCKS=[
  {id:'semi',name:'DAIZE 반도체',sector:'반도체',badge:'bsemi',emoji:'💻',color:'#1e40af',bg:'#dbeafe'},
  {id:'food',name:'DAIZE 식품',  sector:'식품',  badge:'bfood',emoji:'🍱',color:'#166534',bg:'#dcfce7'},
  {id:'ent', name:'DAIZE 엔터',  sector:'엔터',  badge:'bent', emoji:'🎵',color:'#9d174d',bg:'#fce7f3'}
];
const CO_INFO={
  semi:{
    fullName:'DAIZE 반도체 주식회사',
    desc:`DAIZE 반도체는 스마트폰, 컴퓨터, 텔레비전 등 거의 모든 전자 제품 안에 들어가는 아주 작은 부품인 '반도체 칩'을 만드는 회사예요.\n\n쌀알보다도 훨씬 작은 이 칩 안에 수십억 개의 아주 작은 스위치가 들어 있어서, 기계가 계산하고 생각하고 기억할 수 있게 해 줘요. 마치 사람의 뇌 역할을 하는 거랍니다.\n\n최근에는 AI(인공지능)가 크게 유행하면서, AI가 학습하고 생각하는 데 필요한 특수 칩의 수요가 전 세계에서 폭발적으로 늘고 있어요. 전 세계 IT 회사들이 DAIZE 반도체의 칩을 사기 위해 줄을 서고 있답니다!`,
    ceo:'김철수', employees:'4,800명', founded:'2001년'
  },
  food:{
    fullName:'DAIZE 식품 주식회사',
    desc:`DAIZE 식품은 라면, 냉동식품, 과자, 음료 등 맛있는 먹거리를 만드는 회사예요. 우리가 편의점이나 마트에서 자주 보는 식품들이 DAIZE 식품에서 나온답니다.\n\n특히 한국 음식(K-푸드)이 전 세계적으로 인기를 끌면서, 동남아시아와 미국, 유럽에서도 DAIZE 식품 제품을 즐겨 먹고 있어요. 라면 하나가 외국에서 선물로 인기 있을 정도예요!\n\n건강에 관심이 높아지면서 칼로리를 줄인 제품이나 채소로 만든 식품도 열심히 개발하고 있어요. 간편하면서도 건강하게 먹고 싶은 사람들에게 꼭 필요한 회사랍니다.`,
    ceo:'박민정', employees:'3,200명', founded:'1995년'
  },
  ent:{
    fullName:'DAIZE 엔터테인먼트 주식회사',
    desc:`DAIZE 엔터테인먼트는 가수, 배우, 유튜버 등 연예인을 발굴하고 키워내는 회사예요. 우리가 좋아하는 K팝 아이돌 그룹이 여기서 탄생하기도 해요!\n\n이 회사는 음악 제작, 콘서트 기획, 드라마·영화 제작까지 다양한 사업을 해요. K팝은 이제 전 세계 팬들이 열광하는 문화가 됐어요. 미국 빌보드 차트에 오르거나, 유럽·남미에서 콘서트를 열면 수만 명이 모여들어요.\n\n요즘은 음악 스트리밍, 팬덤 앱, 굿즈(가수 관련 상품) 판매로도 큰 수익을 올려요. 팬이 많아질수록 회사 가치도 높아지는 구조랍니다.`,
    ceo:'이지영', employees:'1,600명', founded:'2008년'
  }
};

const NP={

// 30-day pre-sim
function sim30(){
  const h={semi:[100],food:[100],ent:[100]},news=[];
  for(let d=0;d<30;d++){
    const big=(d===14||d===29);
    STOCKS.forEach(s=>{
      const pool=NP[s.id],ni=pool[Math.floor(Math.random()*pool.length)];
      let mc=big?0.10:0.03,c=(Math.random()*mc*2)-mc;
      if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
      const prev=h[s.id][h[s.id].length-1];
      const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
      h[s.id].push(np);
      news.unshift({sid:s.id,t:ni.t,p:ni.p,date:`${30-d}일 전`,price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    });
  }
  return{h,news:news.slice(0,60)};
}

// ── 시장 시간 헬퍼
// 거래 가능 시간: 평일 8:00~14:00
// 시세 변동 시간: 9:00, 11:00, 12:50, 14:00 (4번)
// 개장: 8:40, 마감: 14:00
const MARKET_UPDATE_HOURS=[9,11]; // 정시 기준
const MARKET_UPDATE_SPECIAL={'12:50':true,'14:00':true}; // 특수 시간

function isMarketOpen(){
  if(isWE()) return false;
  const now=kst();
  const h=now.getHours(), m=now.getMinutes();
  const mins=h*60+m;
  return mins>=8*60+40 && mins<14*60;
}

function getMarketUpdateKey(now){
  // 특정 시간에만 업데이트: 9:00, 11:00, 12:50, 14:00
  const h=now.getHours(), m=now.getMinutes();
  const dateStr=now.toDateString();
  if(h===9 &&m===0)  return `${dateStr}-0900`;
  if(h===11&&m===0)  return `${dateStr}-1100`;
  if(h===12&&m===50) return `${dateStr}-1250`;
  if(h===14&&m>=0)   return `${dateStr}-1400`;
  return null;
}

function marketStatus(){
  if(isWE()) return '주말 휴장';
  const now=kst();
  const h=now.getHours(),m=now.getMinutes();
  const mins=h*60+m;
  if(mins<8*60+40) return '개장 전 (8:40 개장)';
  if(mins<14*60){
    const next=[[9,0],[11,0],[12,50],[14,0]].find(([hh,mm])=>hh*60+mm>mins);
    if(next) return `장중 · 다음 업데이트 ${next[0]}:${String(next[1]).padStart(2,'0')}`;
    return '장중';
  }
  return '14:00 최종 확정 (장 마감)';
}

function runMarket(){
  if(!state) return;
  if(isWE()) return;
  if(!isMarketOpen()) return;

  const now=kst();
  const dateStr=now.toDateString();
  const hourKey=getMarketUpdateKey(now);
  if(!hourKey) return; // 업데이트 시간 아님
  if(state.lastHour===hourKey) return; // 이미 처리됨

  const isFinal=hourKey.endsWith('-1400');
  state.lastHour=hourKey;
  if(isFinal){ state.lastMD=dateStr; state.dayCount++; }

  const big=isFinal&&(state.dayCount%22===0);
  const modeMap={
    normal:{max:0.015,bias:0},
    bull:  {max:0.02, bias:0.004},
    bear:  {max:0.02, bias:-0.004},
    flat:  {max:0.005,bias:0},
    surge: {max:0.06, bias:0.03},
    crash: {max:0.07, bias:-0.04},
  };
  const mode=modeMap[state.marketMode||'normal']||modeMap.normal;
  const scale=isFinal?1:0.33;
  const bigMode=big?{max:0.08*scale,bias:mode.bias*1.5}:{max:mode.max*scale,bias:mode.bias*scale};

  STOCKS.forEach(s=>{
    const pool=NP[s.id];
    let ni=null;
    if(isFinal&&state.teacherIssues&&state.teacherIssues.length>0){
      const issue=state.teacherIssues.find(i=>i.sid===s.id&&!i.used);
      if(issue){ni={t:issue.text,p:issue.p};issue.used=true;}
    }
    if(!ni) ni=pool[Math.floor(Math.random()*pool.length)];
    const m=bigMode;
    let c=(Math.random()*m.max*2-m.max)+m.bias;
    const newsInfluence=Math.random()<0.5?0.35:0;
    if(ni.p) c=c*(1-newsInfluence)+Math.abs(c)*newsInfluence;
    else     c=c*(1-newsInfluence)-Math.abs(c)*newsInfluence;
    c=c-0.0005*scale;
    const prev=state.stocks[s.id].price;
    const np=Math.max(1,parseFloat((prev*(1+c)).toFixed(2)));
    state.stocks[s.id].price=np;
    if(isFinal){
      state.stocks[s.id].history.push(np);
      if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
      if(!state.stocks[s.id].dateHistory) state.stocks[s.id].dateHistory=[];
      state.stocks[s.id].dateHistory.push(`${now.getMonth()+1}/${now.getDate()}`);
      if(state.stocks[s.id].dateHistory.length>61) state.stocks[s.id].dateHistory.shift();
      state.news.unshift({
        sid:s.id,t:ni.t,p:ni.p,
        date:dStr(),price:np,prev,
        chg:((np-prev)/prev*100).toFixed(2)
      });
    }
  });
  if(isFinal){
    if(state.teacherIssues) state.teacherIssues=state.teacherIssues.filter(i=>!i.used);
    if(state.news.length>60) state.news=state.news.slice(0,60);
    const now2=kst();
    STUDENTS.forEach(s=>{
      const st=state.students[s.name];
      if(!st||!st.deps) return;
      st.deps.forEach(dep=>{
        if(!dep.done&&!dep.er&&new Date(dep.md)<=now2){
          dep.done=true;
          const int=Math.round(dep.amt*dep.rate*dep.mon);
          const tax=Math.round(int*0.01);
          st.bal=parseFloat((st.bal+dep.amt+int-tax).toFixed(2));
          dep.ret=dep.amt+int-tax;dep.tax=tax;
        }
      });
    });
  }
  ss();
}

const SESSION_LIMIT=15*60; // 15분(초)
let sessionTimer=null,sessionLeft=SESSION_LIMIT;

function startSessionTimer(){
  if(!cu||cu.type==='teacher') return;
  if(state&&state.timerEnabled===false) return;
  const today=dStr();
  const key=`timer_${cu.name}_${today}`;
  const used=parseInt(localStorage.getItem(key)||'0');
  sessionLeft=Math.max(0,SESSION_LIMIT-used);
  if(sessionLeft<=0){ forceLogoutByTimer(); return; }
  const disp=document.getElementById('timerDisp');
  if(disp) disp.style.display='';
  sessionTimer=setInterval(()=>{
    sessionLeft--;
    const used2=SESSION_LIMIT-sessionLeft;
    localStorage.setItem(key,used2);
    updateTimerDisplay();
    if(sessionLeft<=0){ clearInterval(sessionTimer); forceLogoutByTimer(); }
  },1000);
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const disp=document.getElementById('timerDisp');
  if(!disp) return;
  const m=Math.floor(sessionLeft/60),s=sessionLeft%60;
  disp.textContent=`⏱ ${m}:${String(s).padStart(2,'0')}`;
  disp.style.background=sessionLeft<120?'#fee2e2':sessionLeft<300?'#fef3c7':'#d1fae5';
  disp.style.color=sessionLeft<120?'#991b1b':sessionLeft<300?'#92400e':'#065f46';
}

function forceLogoutByTimer(){
  clearInterval(sessionTimer);
  const disp=document.getElementById('timerDisp');
  if(disp){disp.textContent='⏱ 0:00';disp.style.background='#fee2e2';disp.style.color='#991b1b';}
  openModal('⏱ 오늘 접속 시간 종료',`

  `,[{l:'로그아웃',c:'bdan',f:()=>{closeModal();doLogout();}}]);
}

// Cost basis
function updateCB(name,sid,qty,price,buy){
  const st=state.students[name];
  if(!st.cb) st.cb={semi:0,food:0,ent:0};
  if(buy){
    const cq=st.hld[sid]||0,cc=st.cb[sid]||0;
    st.cb[sid]=cq+qty>0?(cc*cq+price*qty)/(cq+qty):0;
  } else {
    if((st.hld[sid]||0)-qty<=0) st.cb[sid]=0;
  }
}

// Calc portfolio
function calcP(name){
  // students 데이터 없으면 기본값 반환
  if(!state.students) state.students={};
  if(!state.students[name])
    state.students[name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0}};
  const st=state.students[name];
  if(!st.hld) st.hld={semi:0,food:0,ent:0};
  if(!st.cb)  st.cb={semi:0,food:0,ent:0};
  if(!st.deps) st.deps=[];
  if(!state.stocks) return{st,sv:0,total:st.bal||0,inv:st.dep0||0,tpnl:-(st.dep0||0),tpct:0,sd:[],dl:0};
  let sv=0;
  const sd=STOCKS.map(s=>{
    const q=st.hld[s.id]||0,cp=state.stocks[s.id].price,ac=st.cb[s.id]||0;
    const val=q*cp,cost=q*ac,pnl=val-cost,pct=cost>0?(pnl/cost*100):0;
    sv+=val;
    return{s,q,cp,ac,val,cost,pnl,pct};
  });
  const dl=(st.deps||[]).filter(d=>!d.done&&!d.er).reduce((a,d)=>a+d.amt,0);
  const total=st.bal+sv+dl,inv=st.dep0||0;
  // 이모지 구매 지출은 투자 손익에서 제외 (iconSpent 누적)
  const iconSpent=st.iconSpent||0;
  const tpnl=total-inv+iconSpent,tpct=inv>0?(tpnl/inv*100):0;
  return{st,sv,total,inv,tpnl,tpct,sd,dl};
}

  ...EMOJI_CATEGORIES.animal.emojis,
  ...EMOJI_CATEGORIES.other.emojis
];
// 이모지 → 가격 조회
function emojiPrice(e){
  if(EMOJI_CATEGORIES.job.emojis.includes(e)) return EMOJI_CATEGORIES.job.price;
  if(EMOJI_CATEGORIES.animal.emojis.includes(e)) return EMOJI_CATEGORIES.animal.price;
  return EMOJI_CATEGORIES.other.price;
}

// 학생 기본 이모지는 🌿 (구매 전까지)
function stuEmoji(name){
  const st=state&&state.students&&state.students[name];
  if(st&&st.customEmoji) return st.customEmoji;
  return '🌿';
}

// ── INVEST (투자시스템 서브탭)
let investSubTab='market';
Object.defineProperty(window,'investSubTab',{get:()=>investSubTab,set:(v)=>{investSubTab=v;}});
function rInvest(el){
  const isTeacher=cu.type==='teacher';
  const subTabs=[{id:'market',l:'📈 시장 현황'},{id:'company',l:'🏢 회사 정보'},{id:'trade',l:'📊 주식 거래'},{id:'deposit',l:'🏦 예금'}];
  const visibleSubs=isTeacher?subTabs.filter(t=>['market','company'].includes(t.id)):subTabs;
  if(isTeacher&&['trade','deposit'].includes(investSubTab)) investSubTab='market';
  if(investSubTab==='news') investSubTab='market';
  let h=`<div style="display:flex;background:white;border-bottom:1.5px solid var(--g200);margin:-1.1rem -1.1rem 1rem;padding:0 .8rem;overflow-x:auto;scrollbar-width:none;">
    ${visibleSubs.map(t=>`<div onclick="investSubTab='${t.id}';switchTab('invest')"
      style="padding:.6rem .9rem;font-size:.8rem;font-weight:500;white-space:nowrap;cursor:pointer;border-bottom:2.5px solid ${investSubTab===t.id?'var(--primary)':'transparent'};color:${investSubTab===t.id?'var(--primary)':'var(--g500)'};">
      ${t.l}</div>`).join('')}
  </div><div id="investSubContent"></div>`;
  el.innerHTML=h;
  const sub=document.getElementById('investSubContent');
  if(sub){switch(investSubTab){
    case'market':rMarket(sub);break;case'company':rCompany(sub);break;
    case'trade':if(!isTeacher)rTrade(sub);break;case'deposit':if(!isTeacher)rDeposit(sub);break;
  }}
}

// ── 이모지 상점
let shopCatTab='job';
Object.defineProperty(window,'shopCatTab',{get:()=>shopCatTab,set:(v)=>{shopCatTab=v;}});

function buyIconTicket(){
  const st=state.students[cu.name];
  const iconMap=st.iconMap||{};
  const lottery=state.lotteryEmojis||[];
  const lotteryWon=state.lotteryWon||{};

  function renderShop(){
    const cat=EMOJI_CATEGORIES[shopCatTab];
    const available=cat.emojis.filter(e=>!iconMap[e]);
    const disp=document.getElementById('selectedIconDisp');
    const sel=disp?disp.textContent.trim():'';
    const selPrice=sel?emojiPrice(sel):0;
    let tabsH=`<div style="display:flex;gap:.3rem;margin-bottom:.75rem;">`;
    Object.entries(EMOJI_CATEGORIES).forEach(([k,v])=>{
      const avail=v.emojis.filter(e=>!iconMap[e]).length;
      tabsH+=`<button onclick="window.shopCatTab='${k}';window._shopRender&&window._shopRender()" class="btn bsm ${shopCatTab===k?'bp':'bs'}" style="flex:1;flex-direction:column;padding:.4rem .2rem;line-height:1.4;">
        <span style="font-size:.8rem;">${v.label}</span>
        <span style="font-size:.72rem;opacity:.8;">${v.price}유로·${avail}개</span>
      </button>`;
    });
    tabsH+=`</div>`;
    const lotteryNote=lottery.filter(e=>!lotteryWon[e]).length>0
      ?`<div style="background:#fef9c3;border-radius:8px;padding:.4rem .65rem;font-size:.76rem;color:#92400e;margin-bottom:.5rem;">🎰 복권 이모지가 숨겨져 있습니다. 구매하다 보면 만날 수 있어요!</div>`:'';
    let gridH=available.length===0
      ?`<div class="empty">이 카테고리 이모지를 모두 보유했습니다! 🎉</div>`
      :`<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:.3rem;max-height:240px;overflow-y:auto;margin-bottom:.6rem;">
        ${available.map((e,idx)=>{
          const won=lotteryWon[e];
          const isSel=sel===e;
          return `<div onclick="window.selectIconEmoji('${e}')" id="ico-${idx}-${shopCatTab}"
            style="font-size:2rem;text-align:center;padding:.35rem .1rem;border-radius:8px;cursor:pointer;
            border:2.5px solid ${isSel?'var(--primary)':won?'#fca5a5':'transparent'};
            background:${isSel?'var(--pl)':won?'#fee2e2':'transparent'};
            position:relative;transition:all .15s;" class="ico-opt">${e}${won?`<span style="position:absolute;top:-3px;right:-3px;font-size:.5rem;background:#ef4444;color:white;border-radius:999px;padding:0 .2rem;">✓</span>`:''}
          </div>`;
        }).join('')}
      </div>`;
    const selInfo=sel
      ?`<div style="display:flex;align-items:center;gap:.5rem;justify-content:center;margin-top:.4rem;">
          <span style="font-size:2rem;">${sel}</span>
          <span style="font-size:.9rem;font-weight:700;color:var(--primary);">${selPrice}유로</span>
          ${(st.bal||0)<selPrice?`<span style="font-size:.75rem;color:var(--dan);">잔액 부족</span>`:''}
        </div>`
      :`<div class="txs tg" style="text-align:center;margin-top:.4rem;">이모지를 탭해서 선택하세요</div>`;
    document.getElementById('shopBody').innerHTML=tabsH+lotteryNote+gridH+selInfo;
    const btn=document.getElementById('shopBuyBtn');
    if(btn){btn.textContent=sel?`구매 (${selPrice}유로)`:'이모지를 선택하세요';btn.disabled=!sel||(st.bal||0)<selPrice;}
  }
  window._shopRender=renderShop;

  document.getElementById('mTitle').textContent='🎨 이모지 상점';
  document.getElementById('mBody').innerHTML=`
    <div style="background:var(--g50);border-radius:8px;padding:.5rem .75rem;margin-bottom:.65rem;display:flex;justify-content:space-between;">
      <span class="tsm">보유 유로</span><span class="tsm fb tp">${fE2(st.bal||0)}</span>
    </div>
    <div style="display:none;"><span id="selectedIconDisp"></span></div>
    <div id="shopBody"></div>`;
  document.getElementById('mActs').innerHTML=`
    <button id="shopBuyBtn" class="btn bp" style="flex:1;" disabled onclick="window.doIconPurchase()">이모지를 선택하세요</button>
    <button class="btn bs" style="flex:.4;" onclick="window.closeModal()">취소</button>`;
  document.getElementById('modalOverlay').classList.add('open');
  renderShop();
}

function selectIconEmoji(e){
  // 이전 선택 초기화
  document.querySelectorAll('.ico-opt').forEach(el=>{
    el.style.borderColor='transparent';
    el.style.background='transparent';
  });
  // 현재 선택 이모지와 텍스트가 일치하는 요소 찾기
  document.querySelectorAll('.ico-opt').forEach(el=>{
    if(el.textContent.trim()===e||(el.firstChild&&el.firstChild.textContent===e)){
      el.style.borderColor='var(--primary)';
      el.style.background='var(--pl)';
    }
  });
  const disp=document.getElementById('selectedIconDisp');
  if(disp) disp.textContent=e;
  if(window._shopRender) window._shopRender();
}

function doIconPurchase(){
  const st=state.students[cu.name];
  const disp=document.getElementById('selectedIconDisp');
  const sel=disp?disp.textContent.trim():'';
  if(!sel){showToast('이모지를 선택해주세요.');return;}
  const price=emojiPrice(sel);
  if((st.bal||0)<price){showToast(`잔액 부족 (필요: ${price}유로)`);return;}
  st.bal=parseFloat((st.bal-price).toFixed(2));
  st.iconSpent=(st.iconSpent||0)+price;
  if(!st.iconMap) st.iconMap={};
  st.iconMap[sel]=true;
  const isLotteryEmoji=(state.lotteryEmojis||[]).includes(sel);
  const alreadyWon=(state.lotteryWon||{})[sel];
  let isWin=false;
  if(isLotteryEmoji&&!alreadyWon){
    isWin=true;
    st.bal=parseFloat((st.bal+100).toFixed(2));
    if(!state.lotteryWon) state.lotteryWon={};
    state.lotteryWon[sel]=cu.name;
  }
  st.customEmoji=sel;
  ss();closeModal();
  if(isWin){
    playSound('win');
    setTimeout(()=>{openModal('🎉 복권 당첨!',`
      <div style="text-align:center;padding:.5rem 0;">
        <div style="font-size:4rem;margin-bottom:.5rem;">${sel}</div>
        <div style="font-size:1.3rem;font-weight:700;color:var(--suc);margin-bottom:.4rem;">+100유로 지급!</div>
        <div style="font-size:.88rem;color:var(--g700);">${cu.name} 학생이 ${sel} 이모지<br/>최초 구매자로 100유로를 받았습니다! 🥳</div>
      </div>
    `,[{l:'🎉 확인!',c:'bsuc',f:closeModal}]);},300);
  } else if(isLotteryEmoji&&alreadyWon){
    showToast(`${sel}은 이미 ${alreadyWon}이(가) 당첨했어요!`);
  } else {
    playSound('buy');
    showToast(`${sel} 구매 완료! (${price}유로)`);
  }
  populateStudentSelect();
  updateTopbarLabel();
  switchTab('portfolio');
}

  const st=state.students[cu.name];const isD=type==='deposit';

function miniChart(history,isUp){
  const data=history.slice(-31);if(data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data);
  const w=300,h=50,rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;"><polyline points="${pts}" fill="none" stroke="${isUp?'#0e9f6e':'#e02424'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// 날짜 포함 상세 차트 (시장 현황용)
function detailChart(sid){
  const stk=state.stocks[sid];
  const hist=stk.history||[];
  const dateHist=stk.dateHistory||[];
  if(hist.length<2) return '<div class="empty txs">데이터 부족</div>';

  const W=320,H=130,PAD={t:18,r:12,b:32,l:48};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
  const data=hist.slice(-31);
  const dates=dateHist.length>=data.length
    ? dateHist.slice(-data.length)
    : data.map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(data.length-1-i)); return`${d.getMonth()+1}/${d.getDate()}`; });

  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const px=(i)=>PAD.l+(i/(data.length-1))*cw;
  const py=(v)=>PAD.t+ch-((v-mn)/rng)*ch;
  const color=data[data.length-1]>=data[0]?'#0e9f6e':'#e02424';
  const fillColor=data[data.length-1]>=data[0]?'rgba(14,159,110,.08)':'rgba(224,36,36,.08)';

  // 폴리라인 포인트
  const pts=data.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  // 채우기 영역
  const fillPts=`${px(0)},${PAD.t+ch} `+data.map((v,i)=>`${px(i)},${py(v)}`).join(' ')+` ${px(data.length-1)},${PAD.t+ch}`;

  // Y축 레이블 (3개)
  const yTicks=[mn, (mn+mx)/2, mx];
  let yAxis='';
  yTicks.forEach(v=>{
    const y=py(v);
    yAxis+=`<line x1="${PAD.l-4}" y1="${y}" x2="${PAD.l+cw}" y2="${y}" stroke="var(--g200)" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="${PAD.l-6}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--g500)">${v.toFixed(0)}</text>`;
  });

  // X축 레이블 (최대 5개)
  let xAxis='';
  const step=Math.ceil(data.length/5);
  for(let i=0;i<data.length;i+=step){
    xAxis+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" font-size="8.5" fill="var(--g500)">${dates[i]||''}</text>`;
  }
  // 마지막 날짜 항상 표시
  xAxis+=`<text x="${px(data.length-1)}" y="${H-4}" text-anchor="middle" font-size="8.5" fill="${color}" font-weight="bold">${dates[dates.length-1]||''}</text>`;

  // 데이터 포인트 (마지막만 강조)
  const lastX=px(data.length-1), lastY=py(data[data.length-1]);
  const firstX=px(0), firstY=py(data[0]);

  // 호버 tooltip용 투명 rect들
  let hoverRects='';
  data.forEach((v,i)=>{
    const x=px(i);
    const rectW=cw/(data.length-1);
    hoverRects+=`<g class="chart-pt" style="cursor:pointer;">
      <rect x="${x-rectW/2}" y="${PAD.t}" width="${rectW}" height="${ch}" fill="transparent"/>
      <circle cx="${x}" cy="${py(v)}" r="2.5" fill="${color}" opacity="0" class="chart-dot"/>
      <title>${dates[i]||''}: ${fE2(v)}</title>
    </g>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible;">
    <style>
      .chart-pt:hover .chart-dot{opacity:1;}
      .chart-pt:hover rect{fill:rgba(0,0,0,.03);}
    </style>
    ${yAxis}
    ${xAxis}
    <polygon points="${fillPts}" fill="${fillColor}"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${firstX}" cy="${firstY}" r="3" fill="var(--g400)"/>
    <circle cx="${lastX}" cy="${lastY}" r="4" fill="${color}" stroke="white" stroke-width="1.5"/>
    <text x="${lastX}" y="${lastY-8}" text-anchor="middle" font-size="10" font-weight="bold" fill="${color}">${fE2(data[data.length-1])}</text>
    ${hoverRects}
  </svg>`;
}

function exTrade(sid,action){
  if(isWE()){showToast('주말에는 거래가 불가능합니다. 📅');return;}
  const st=state.students[cu.name],stk=state.stocks[sid];
  const qty=parseInt(document.getElementById('q-'+sid)?.value||0);
  if(!qty||qty<=0){showToast('수량을 입력해주세요.');return;}
  const sn=STOCKS.find(s=>s.id===sid).name;
  if(action==='buy'){
    const cost=qty*stk.price;
    if(cost>st.bal){showToast('투자 가능 금액이 부족합니다!');return;}
    updateCB(cu.name,sid,qty,stk.price,true);
    st.bal=parseFloat((st.bal-cost).toFixed(2));
    st.hld[sid]=(st.hld[sid]||0)+qty;
    showToast(`${sn} ${qty}주 매수! (-${fE2(cost)})`);
    playSound('buy');
  } else {
    const held=st.hld[sid]||0;
    if(qty>held){showToast(`보유 주식 부족 (보유: ${held}주)`);return;}
    const fee=qty*(state.sellFee||1),proc=qty*stk.price-fee;
    if(proc<0){showToast('수수료가 매도금액보다 큽니다.');return;}
    updateCB(cu.name,sid,qty,stk.price,false);
    st.bal=parseFloat((st.bal+proc).toFixed(2));
    st.hld[sid]-=qty;
    showToast(`${sn} ${qty}주 매도! (+${fE2(proc)}, 수수료 ${fE2(fee)})`);
    playSound('sell');
  }
  ss();
  const tradeEl=document.getElementById('investSubContent')||document.getElementById('tab-trade');
  if(tradeEl) rTrade(tradeEl);
}

    // 내가 5위 밖이면 내 순위 추가
    const myIdx=rows.findIndex(r=>isMine(r));
    if(cu.type==='student'&&myIdx>=5){
      const r=rows[myIdx];
      h+=`<div style="display:flex;align-items:center;gap:.65rem;padding:.55rem 1rem;
        background:var(--pl);border-left:3px solid ${color};border-top:2px dashed var(--g200);">
        <div style="min-width:1.6rem;text-align:center;font-size:.85rem;font-weight:700;">${myIdx+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:.85rem;">${stuEmoji(r.name)} ${r.name} <span style="font-size:.7rem;color:var(--g500);">(내 순위)</span></div>
          <div style="font-size:.72rem;color:var(--g500);margin-top:.05rem;">${subFn(r)}</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:${color};white-space:nowrap;">${valFn(r)}</div>
      </div>`;
    }
    h+=`</div>`;
    return h;
  }

  // 1. 투자의 신 — 수익금 기준
  const profitRows=mkRows(all.filter(r=>r.inv>0),(a,b)=>b.tpnl-a.tpnl);
  // 2. 수익률의 신 — 수익률 기준
  const pctRows=mkRows(all.filter(r=>r.inv>0),(a,b)=>b.tpct-a.tpct);
  // 3. 기부의 신 — 기부 총액
  const donRows=mkRows(all.filter(r=>r.donTotal>0),(a,b)=>b.donTotal-a.donTotal);
  // 4. 이모지 마스터 — 이모지 보유 개수
  const emojiRows=mkRows(all.filter(r=>r.iconCount>0),(a,b)=>b.iconCount-a.iconCount);
  // 5. 저축의 신 — 예금 총액
  const depRows=mkRows(all.filter(r=>r.depTotal>0),(a,b)=>b.depTotal-a.depTotal);

  let h=`<div style="background:linear-gradient(135deg,#1e40af,#7c3aed);border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:.9rem;text-align:center;">
    <div style="font-size:1.5rem;margin-bottom:.25rem;">🏆</div>
    <div style="color:white;font-weight:700;font-size:1rem;">랭킹</div>
    <div style="color:rgba(255,255,255,.7);font-size:.75rem;margin-top:.15rem;">다이제국 명예의 전당</div>
  </div>`;

  h+=rankSection('투자의 신','💰','#0e9f6e',profitRows,
    r=>`${r.tpnl>=0?'+':''}${fE2(r.tpnl)}`,
    r=>`수익률 ${r.tpnl>=0?'+':''}${r.tpct.toFixed(1)}% | 원금 ${fE(r.inv)}`,
    '아직 투자한 학생이 없습니다.');

  h+=rankSection('수익률의 신','📈','#1d4ed8',pctRows,
    r=>`${r.tpct>=0?'+':''}${r.tpct.toFixed(1)}%`,
    r=>`수익금 ${r.tpnl>=0?'+':''}${fE2(r.tpnl)} | 원금 ${fE(r.inv)}`,
    '아직 투자한 학생이 없습니다.');

  h+=rankSection('기부의 신','🌳','#059669',donRows,
    r=>fE2(r.donTotal),
    r=>`누적 기부 ${fE2(r.donTotal)}`,
    '아직 기부한 학생이 없습니다.');

  h+=rankSection('이모지 마스터','🎨','#7c3aed',emojiRows,
    r=>`${r.iconCount}개`,
    r=>`보관함 ${r.iconCount}개 보유`,
    '아직 이모지를 구매한 학생이 없습니다.');

  h+=rankSection('저축의 신','🏦','#b45309',depRows,
    r=>fE(r.depTotal),
    r=>`예금 중 ${fE(r.depTotal)}`,
    '아직 예금한 학생이 없습니다.');

  el.innerHTML=h;
}

// ── BOARD (게시판)
const BAD_WORDS=['씨발','개새끼','병신','지랄','닥쳐','꺼져','미친놈','죽어','바보','멍청','돼지','찐따','장애','보지','자지','섹스','fuck','shit','bitch','ass'];
function filterBad(txt){
  let out=txt;
  BAD_WORDS.forEach(w=>{
    const re=new RegExp(w,'gi');
    out=out.replace(re,'*'.repeat(w.length));
  });
  return out;
}

function todayPostCount(name){
  const today=dStr();
  return (state.board||[]).filter(p=>p.author===name&&p.date===today).length;
}
function todayCommentCount(name){
  const today=dStr();
  let cnt=0;
  (state.board||[]).forEach(p=>(p.comments||[]).forEach(c=>{if(c.author===name&&c.date===today)cnt++;}));
  return cnt;
}

let boardView=null; // null=목록, id=상세

Object.defineProperty(window,'boardView',{
  get:()=>boardView,
  set:(v)=>{boardView=v;}
});

function rBoard(el){
  if(boardView) {rBoardDetail(el,boardView);return;}

function showBoardWrite(){
  const left=3-todayPostCount(cu.name);
  if(left<=0){showToast('오늘 작성 가능한 글 수(3개)를 초과했습니다.');return;}
  openModal('글쓰기',`
    <div class="fg"><label>제목</label><input type="text" id="bTitle" placeholder="제목 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.9rem;font-family:inherit;"/></div>
    <div class="fg"><label>내용</label><textarea id="bContent" rows="4" placeholder="내용 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.88rem;font-family:inherit;resize:vertical;"></textarea></div>
    <div class="fg"><label>사진 첨부 (선택)</label><input type="file" id="bImage" accept="image/*" style="font-size:.82rem;"/></div>
    <div class="txs tg">오늘 남은 글 수: ${left}개</div>
  `,[
    {l:'등록',c:'bp',f:async()=>{
      const title=document.getElementById('bTitle').value.trim();
      const content=document.getElementById('bContent').value.trim();
      const imgFile=document.getElementById('bImage').files[0];
      if(!title||!content){showToast('제목과 내용을 입력해주세요.');return;}
      let imgData='';
      if(imgFile){
        imgData=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(imgFile);});
      }
      if(!state.board) state.board=[];
      state.board.unshift({id:'p'+Date.now(),title,content,author:cu.name,date:dStr(),image:imgData,comments:[]});
      ss();showToast('게시글이 등록되었습니다!');closeModal();
      boardView=null;rBoard(document.getElementById('tab-board'));
    }},
    {l:'취소',c:'bs',f:closeModal}
  ]);
}

function addComment(pid){
  const txt=document.getElementById('commentInput').value.trim();
  if(!txt){showToast('댓글 내용을 입력해주세요.');return;}
  if(todayCommentCount(cu.name)>=10){showToast('오늘 댓글 한도(10개)를 초과했습니다.');return;}
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post) return;
  if(!post.comments) post.comments=[];
  post.comments.push({text:txt,author:cu.name,date:dStr(),ts:new Date().toISOString()});
  ss();switchTab('board');
}

function deletePost(pid){
  openModal('게시글 삭제',`<p class="tsm">이 게시글을 삭제합니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      state.board=(state.board||[]).filter(p=>p.id!==pid);
      ss();closeModal();boardView=null;switchTab('board');
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function deleteComment(pid,idx){
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post) return;
  post.comments.splice(idx,1);
  ss();switchTab('board');
}

// ── VICE TEACHER (부담임)
let viceSelectedHw=null;
Object.defineProperty(window,'viceSelectedHw',{
  get:()=>viceSelectedHw,
  set:(v)=>{viceSelectedHw=v;}
});
function rVice(el){
  const hw=(state.homework||[]);
  let h=`<div class="card"><div class="ct">📋 부담임 제출 확인</div>
  <p class="tsm tg" style="margin-bottom:.65rem;">과제를 선택하고 학생 이름을 탭하면 제출 여부가 표시됩니다. 결과를 교사에게 전송할 수 있습니다.</p>
  <div class="fg"><label>확인할 과제 선택</label>
  <select id="viceHwSel" onchange="viceSelectedHw=this.value;rVice(document.getElementById('tab-vice'))" style="width:100%;padding:.6rem .85rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;">
    <option value="">— 과제 선택 —</option>
    ${hw.map(a=>`<option value="${a.id}" ${viceSelectedHw===a.id?'selected':''}>${a.title}</option>`).join('')}
  </select></div></div>`;

  if(viceSelectedHw){
    const a=hw.find(x=>x.id===viceSelectedHw);
    if(a){
      const cl=state.checkLists||{};
      const myCheck=cl[viceSelectedHw]||{};
      const listName=myCheck._listName||`${a.title} 확인`;
      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
          <div class="ct" style="margin-bottom:0;">${listName}</div>
          <button class="btn bs bsm" onclick="renameViceList('${viceSelectedHw}')">이름 변경</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.85rem;">
        ${realStudents().map(s=>{
          const checked=!!myCheck[s.name];
          return `<div onclick="toggleViceCheck('${viceSelectedHw}','${s.name}')"
            style="padding:.65rem .5rem;border-radius:10px;border:1.5px solid ${checked?'var(--suc)':'var(--g200)'};
            background:${checked?'var(--success-light)':'var(--g50)'};cursor:pointer;text-align:center;
            transition:all .15s;-webkit-tap-highlight-color:transparent;">
            <div style="font-size:.85rem;font-weight:${checked?'700':'400'};color:${checked?'var(--suc)':'var(--g700)'};">${s.name}</div>
            <div style="font-size:.7rem;color:${checked?'var(--suc)':'var(--g500)'};">${checked?'✅ 확인':'—'}</div>
          </div>`;
        }).join('')}
        </div>
        <div style="display:flex;gap:.5rem;">
          <button class="btn bsuc bsm" onclick="sendViceToTeacher('${viceSelectedHw}')">교사에게 전송</button>
          <button class="btn bs bsm" onclick="clearViceCheck('${viceSelectedHw}')">초기화</button>
        </div>
      </div>`;
    }
  }
  el.innerHTML=h;
}

function toggleViceCheck(hid,name){
  if(!state.checkLists) state.checkLists={};
  if(!state.checkLists[hid]) state.checkLists[hid]={};
  state.checkLists[hid][name]=!state.checkLists[hid][name];
  ss();rVice(document.getElementById('tab-vice'));
}

function renameViceList(hid){
  openModal('목록 이름 변경',`
    <div class="fg"><label>새 이름</label><input type="text" id="vListName" placeholder="목록 이름 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.9rem;font-family:inherit;"/></div>
  `,[
    {l:'변경',c:'bp',f:()=>{
      const n=document.getElementById('vListName').value.trim();
      if(!n){showToast('이름을 입력해주세요.');return;}
      if(!state.checkLists) state.checkLists={};
      if(!state.checkLists[hid]) state.checkLists[hid]={};
      state.checkLists[hid]._listName=n;
      ss();closeModal();rVice(document.getElementById('tab-vice'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function sendViceToTeacher(hid){
  const a=(state.homework||[]).find(x=>x.id===hid);
  const cl=(state.checkLists||{})[hid]||{};
  const checked=realStudents().filter(s=>cl[s.name]).map(s=>s.name);
  const notChecked=realStudents().filter(s=>!cl[s.name]).map(s=>s.name);
  const listName=cl._listName||a?.title||'확인 목록';
  openModal('교사에게 전송',`
    <p class="tsm fb" style="margin-bottom:.5rem;">${listName}</p>
    <p class="tsm" style="margin-bottom:.35rem;color:var(--suc);">✅ 확인됨 (${checked.length}명): ${checked.join(', ')||'없음'}</p>
    <p class="tsm" style="color:var(--dan);">❌ 미확인 (${notChecked.length}명): ${notChecked.join(', ')||'없음'}</p>
  `,[{l:'확인',c:'bp',f:closeModal}]);
}

function clearViceCheck(hid){
  openModal('초기화 확인',`<p class="tsm">이 목록의 체크를 모두 초기화합니다.</p>`,[
    {l:'초기화',c:'bdan',f:()=>{
      const name=(state.checkLists?.[hid]||{})._listName;
      if(!state.checkLists) state.checkLists={};
      state.checkLists[hid]={};
      if(name) state.checkLists[hid]._listName=name;
      ss();closeModal();rVice(document.getElementById('tab-vice'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

// ── DONATION (기부)
function rDonation(el){
  const goals=(state.donationGoals||[]).slice().sort((a,b)=>a.amount-b.amount);
  const total=state.totalDonation||0;
  const maxGoal=goals.length>0?goals[goals.length-1].amount:2000;
  const pct=Math.min(100,(total/maxGoal)*100);

  // 나무 성장 단계 계산
  function treeStage(pct){
    if(pct<5)  return{emoji:'🌱',label:'씨앗',color:'#84cc16'};
    if(pct<20) return{emoji:'🌿',label:'새싹',color:'#22c55e'};
    if(pct<40) return{emoji:'🌳',label:'작은 나무',color:'#16a34a'};
    if(pct<65) return{emoji:'🌲',label:'큰 나무',color:'#15803d'};
    if(pct<85) return{emoji:'🌸',label:'꽃 피는 나무',color:'#ec4899'};
    return{emoji:'✨🌟🌳🌟✨',label:'황금 나무',color:'#d97706'};
  }
  const stage=treeStage(pct);
  const isTeacher=cu.type==='teacher';
  const st=state.students[cu.name];
  const myBal=isTeacher?0:(st?.bal||0);

  let h=`
  <!-- 나무 UI -->
  <div style="background:linear-gradient(180deg,#e0f2fe 0%,#f0fdf4 60%,#dcfce7 100%);border-radius:var(--r);padding:1.5rem 1.2rem;text-align:center;box-shadow:var(--sh);margin-bottom:.9rem;">
    <div style="font-size:4.5rem;margin-bottom:.4rem;transition:all .5s;">${stage.emoji}</div>
    <div style="font-weight:700;font-size:1rem;color:${stage.color};margin-bottom:.25rem;">${stage.label}</div>
    <div style="font-size:.82rem;color:var(--g700);margin-bottom:1rem;">우리 반 나무 · 누적 기부 <strong style="color:${stage.color};">${fE2(total)}</strong></div>
    <!-- 프로그레스 바 -->
    <div style="background:var(--g200);border-radius:999px;height:18px;overflow:hidden;margin-bottom:.5rem;position:relative;">
      <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#22c55e,${stage.color});border-radius:999px;transition:width .8s;min-width:${pct>0?'4px':'0'};"></div>
    </div>
    <div style="font-size:.75rem;color:var(--g500);">${pct.toFixed(1)}% 달성</div>
  </div>

  <!-- 목표/보상 목록 -->
  <div class="card"><div class="ct">🎁 기부 보상 목록</div>`;

  goals.forEach(g=>{
    const unlocked=total>=g.amount;
    const gPct=Math.min(100,(total/g.amount)*100);
    h+=`<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--g200);">
      <div style="font-size:1.6rem;opacity:${unlocked?1:.35};">🎁</div>
      <div style="flex:1;">
        <div style="font-size:.88rem;font-weight:600;color:${unlocked?'var(--suc)':'var(--g700)'};">${g.reward}</div>
        <div style="font-size:.72rem;color:var(--g500);margin-top:.1rem;">목표: ${fE2(g.amount)}</div>
        <div style="background:var(--g200);border-radius:999px;height:6px;margin-top:.3rem;overflow:hidden;">
          <div style="width:${gPct}%;height:100%;background:${unlocked?'var(--suc)':'var(--primary)'};border-radius:999px;"></div>
        </div>
      </div>
      <div style="font-size:.85rem;font-weight:700;color:${unlocked?'var(--suc)':'var(--g500)'};">${unlocked?'✅ 해금':'🔒'}</div>
    </div>`;
  });
  h+=`</div>`;

  // 기부하기 (학생만)
  if(!isTeacher){
    h+=`<div class="card"><div class="ct">💚 기부하기</div>
    <p class="tsm tg" style="margin-bottom:.65rem;">내 유로를 반 나무에 기부해요. 기부금은 반환되지 않습니다.</p>
    <p class="tsm" style="margin-bottom:.6rem;">내 투자 가능 금액: <strong class="tp">${fE2(myBal)}</strong></p>
    <div style="display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.5rem;">
      ${[10,50,100,500].map(a=>`<button class="btn bs bsm" onclick="donateAmount(${a})" ${myBal<a?'disabled':''}>+${a}유로</button>`).join('')}
    </div>
    <div style="display:flex;gap:.45rem;align-items:flex-end;">
      <div class="fg" style="flex:1;margin-bottom:0;"><label>직접 입력</label>
        <input type="number" id="donateInput" min="1" step="1" placeholder="금액 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;"/>
      </div>
      <button class="btn bsuc bsm" onclick="donateCustom()">기부</button>
    </div></div>`;
  }

  // 기부 기록
  const donLog=(state.donationLog||[]).slice(0,20);
  if(donLog.length>0){
    h+=`<div class="card"><div class="ct">📋 최근 기부 내역</div>`;
    donLog.forEach(d=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--g200);font-size:.83rem;">
        <span>${stuEmoji(d.name)} ${d.name}</span>
        <span class="tsuc fb">+${fE2(d.amount)}</span>
        <span class="txs tg">${d.date}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
}

function donateAmount(amt){
  const st=state.students[cu.name];
  if((st.bal||0)<amt){showToast('잔액이 부족합니다.');return;}
  confirmDonate(amt);
}

function donateCustom(){
  const v=parseFloat(document.getElementById('donateInput')?.value);
  if(!v||v<=0){showToast('금액을 입력해주세요.');return;}
  const st=state.students[cu.name];
  if((st.bal||0)<v){showToast('잔액이 부족합니다.');return;}
  confirmDonate(v);
}

function confirmDonate(amt){
  const rounded=parseFloat(amt.toFixed(2));
  openModal('💚 기부 확인',`
    <div style="text-align:center;padding:.5rem 0;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">🌳</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--suc);margin-bottom:.3rem;">${fE2(rounded)}</div>
      <div style="font-size:.88rem;color:var(--g700);">를 우리 반 나무에 기부합니다.<br/>기부금은 반환되지 않습니다.</div>
    </div>
  `,[
    {l:'💚 기부하기',c:'bsuc',f:()=>{closeModal();processDonate(rounded);}},
    {l:'취소',c:'bs',f:closeModal}
  ]);
}

function processDonate(amt){
  const st=state.students[cu.name];
  const rounded=parseFloat(amt.toFixed(2));
  st.bal=parseFloat((st.bal-rounded).toFixed(2));
  st.iconSpent=(st.iconSpent||0)+rounded; // 기부도 투자 손익 제외
  state.totalDonation=parseFloat(((state.totalDonation||0)+rounded).toFixed(2));
  if(!state.donationLog) state.donationLog=[];
  state.donationLog.unshift({name:cu.name,amount:rounded,date:dStr(),ts:new Date().toISOString()});
  if(state.donationLog.length>100) state.donationLog=state.donationLog.slice(0,100);
  ss();
  playSound('buy');
  showToast(`💚 ${fE2(rounded)} 기부 완료! 고마워요!`);
  switchTab('donation');
}

// ── PATROL LOG (순찰일지)
let patrolFilter={year:'',month:'',student:''};
function rPatrol(el){
  const logs=(state.patrolLog||[]);
  const years=[...new Set(logs.map(l=>l.date.split('-')[0]))].sort((a,b)=>b-a);
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];

  // 필터 적용
  let filtered=logs.filter(l=>{
    const [y,m]=l.date.split('-');
    if(patrolFilter.year&&y!==patrolFilter.year) return false;
    if(patrolFilter.month&&m!==patrolFilter.month) return false;
    if(patrolFilter.student&&l.target!==patrolFilter.student) return false;
    return true;
  });

  let h=``;

  // 작성 폼 (경찰만)
  if(cu.type!=='teacher'){
    h+=`<div class="card"><div class="ct">📝 순찰일지 작성</div>
    <div class="fg"><label>날짜 (비우면 오늘)</label>
      <input type="date" id="pDate" style="width:100%;padding:.52rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;"/>
    </div>
    <div class="fg">
      <label style="margin-bottom:.5rem;display:block;">대상 학생 (복수 선택 가능)</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem;">
        ${realStudents().map(s=>`
          <label style="display:flex;align-items:center;gap:.5rem;background:var(--g50);border:1.5px solid var(--g200);border-radius:10px;padding:.55rem .7rem;cursor:pointer;-webkit-tap-highlight-color:transparent;"
            onclick="togglePatrolStudent(this,'${s.name}')">
            <span style="width:22px;height:22px;border:2px solid var(--g300);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;" class="pchk-box"></span>
            <span style="font-size:.88rem;font-weight:500;">${s.no}번 ${s.name}</span>
            <input type="checkbox" class="pchk" value="${s.name}" style="display:none;"/>
          </label>`).join('')}
      </div>
      <div style="margin-top:.5rem;display:flex;gap:.4rem;">
        <button class="btn bs bsm" onclick="selectAllPatrol(true)">전체 선택</button>
        <button class="btn bs bsm" onclick="selectAllPatrol(false)">전체 해제</button>
      </div>
    </div>
    <div class="fg"><label>내용 (한 문장)</label>
      <input type="text" id="pContent" placeholder="예: 수업 중 떠들음" style="width:100%;padding:.6rem .85rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;"/>
    </div>
    <div class="fg"><label>점수 (-5 ~ +5)</label>
      <div style="display:flex;align-items:center;gap:.7rem;">
        <input type="range" id="pScore" min="-5" max="5" step="1" value="1"
          oninput="const v=parseInt(this.value);document.getElementById('pScoreDisp').textContent=(v>0?'+':'')+v;document.getElementById('pScoreDisp').style.color=v>0?'var(--suc)':v<0?'var(--dan)':'var(--g500)';"
          style="flex:1;height:6px;"/>
        <span id="pScoreDisp" style="font-size:1.2rem;font-weight:700;min-width:36px;text-align:center;color:var(--suc);">+1</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--g500);margin-top:.2rem;">
        <span>-5 (심각)</span><span>0 (보통)</span><span>+5 (최고)</span>
      </div>
    </div>
    <button class="btn bp" style="width:100%;padding:.7rem;" onclick="addPatrolLog()">✅ 일지 등록</button>
    </div>`;
  }

  // 필터
  h+=`<div class="card"><div class="ct">🔍 필터</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;">
    <div>
      <div class="txs tg" style="margin-bottom:.2rem;">연도</div>
      <select id="pfYear" onchange="setPatrolFilter('year',this.value)" style="width:100%;padding:.42rem .55rem;border:1px solid var(--g200);border-radius:8px;font-size:.78rem;font-family:inherit;">
        <option value="">전체</option>
        ${years.map(y=>`<option value="${y}" ${patrolFilter.year===y?'selected':''}>${y}년</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="txs tg" style="margin-bottom:.2rem;">월</div>
      <select id="pfMonth" onchange="setPatrolFilter('month',this.value)" style="width:100%;padding:.42rem .55rem;border:1px solid var(--g200);border-radius:8px;font-size:.78rem;font-family:inherit;">
        <option value="">전체</option>
        ${months.map(m=>`<option value="${m}" ${patrolFilter.month===m?'selected':''}>${parseInt(m)}월</option>`).join('')}
      </select>
    </div>
    <div>
      <div class="txs tg" style="margin-bottom:.2rem;">학생</div>
      <select id="pfStudent" onchange="setPatrolFilter('student',this.value)" style="width:100%;padding:.42rem .55rem;border:1px solid var(--g200);border-radius:8px;font-size:.78rem;font-family:inherit;">
        <option value="">전체</option>
        ${realStudents().map(s=>`<option value="${s.name}" ${patrolFilter.student===s.name?'selected':''}>${s.name}</option>`).join('')}
      </select>
    </div>
  </div>

  // 통계
  const pos=filtered.filter(l=>l.score>0).length;

  const totalScore=filtered.reduce((a,l)=>a+l.score,0);
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.85rem;">

  </div>`;

  // 일지 목록
  h+=`<div class="card"><div class="ct">📋 순찰일지 ${filtered.length>0?`(${filtered.length}건)`:''}</div>`;
  if(!filtered.length){h+=`<div class="empty">기록이 없습니다.</div>`;}
  else{
    let lastDate='';
    filtered.forEach((l,i)=>{
      const isPos=l.score>0;
      const isNeu=l.score===0;
      const scoreColor=isNeu?'var(--g500)':isPos?'var(--suc)':'var(--dan)';
      const scoreStr=l.score>0?`+${l.score}`:l.score.toString();
      // 같은 날짜면 날짜 생략
      const showDate=l.date!==lastDate;
      lastDate=l.date;
      const [y,m,d]=l.date.split('-');
      const dateLabel=`${parseInt(m)}/${parseInt(d)}`;
      h+=`<div style="display:flex;gap:.6rem;align-items:flex-start;padding:.5rem 0;border-bottom:1px solid var(--g200);">

        <div style="flex:1;">
          <span style="font-weight:600;font-size:.83rem;">${l.target}</span>
          <span class="tsm tg"> ${l.content}</span>
        </div>
        <div style="font-weight:700;font-size:.88rem;color:${scoreColor};min-width:28px;text-align:right;">${scoreStr}</div>
        ${(cu.type==='teacher'||(state.police||[]).includes(cu.name))?`<button onclick="deletePatrolLog(${i})" style="border:none;background:none;cursor:pointer;color:var(--g500);font-size:.75rem;padding:.1rem .3rem;">✕</button>`:''}
      </div>`;
    });
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function togglePatrolStudent(labelEl, name){

  chk.checked=!chk.checked;
  if(chk.checked){

  if(!state.patrolLog) state.patrolLog=[];

function deletePatrolLog(idx){
  const filtered=getPatrolFiltered();
  const item=filtered[idx];
  if(!item) return;
  const realIdx=state.patrolLog.findIndex(l=>l.ts===item.ts);
  if(realIdx===-1) return;
  openModal('삭제 확인',`<p class="tsm"><strong>${item.target}</strong> - ${item.content} 기록을 삭제합니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      state.patrolLog.splice(realIdx,1);
      ss();closeModal();rPatrol(document.getElementById('tab-patrol'));

  ]);
}

function getPatrolFiltered(){
  return (state.patrolLog||[]).filter(l=>{
    const [y,m]=l.date.split('-');
    if(patrolFilter.year&&y!==patrolFilter.year) return false;
    if(patrolFilter.month&&m!==patrolFilter.month) return false;
    if(patrolFilter.student&&l.target!==patrolFilter.student) return false;
    return true;
  });
}

// ── SOUND EFFECTS (Web Audio API)
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='buy'){
      o.frequency.setValueAtTime(440,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='sell'){
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='deposit'){
      // 동전 소리 느낌
      o.frequency.setValueAtTime(1200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    } else if(type==='win'){
      // 복권 당첨 팡파레 — 4음 상승
      o.stop(); // 기본 오실레이터 정지
      const freqs=[523,659,784,1047];
      freqs.forEach((f,i)=>{
        const o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.setValueAtTime(f,ctx.currentTime+i*0.13);
        g2.gain.setValueAtTime(0.35,ctx.currentTime+i*0.13);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.28);
        o2.start(ctx.currentTime+i*0.13);
        o2.stop(ctx.currentTime+i*0.13+0.28);
      });
    }
  }catch(e){}
}

function appC(id){
  const req=state.pd.find(r=>r.id===id);if(!req)return;
  const st=state.students[req.to];
  if(req.type==='deposit'){
    st.bal=parseFloat((st.bal+req.amt).toFixed(2));st.dep0=(st.dep0||0)+req.amt;
    addTxLog('deposit',req.to,req.amt,cu.name,'요청 승인');
  } else {
    const amt=Math.round(req.amt);
    if(st.bal<amt){showToast('투자 가능 금액 부족');return;}
    st.bal=parseFloat((st.bal-amt).toFixed(2));st.dep0=Math.max(0,(st.dep0||0)-amt);
    addTxLog('withdraw',req.to,amt,cu.name,'요청 승인');
  }
  req.st='approved';ss();showToast(`${req.to} ${req.type==='deposit'?'입금':'출금'} 승인!`);
  rCashier(document.getElementById('tab-cashier'));
}

function tchNews(){
  if(isWE()){showToast('주말에는 뉴스를 발행할 수 없습니다.');return;}
  STOCKS.forEach(s=>{
    const sel=document.getElementById('nS-'+s.id);
    const idx=sel?.value,pool=NP[s.id];
    const ni=idx!==''?pool[parseInt(idx)]:null; // null이면 runMarket에서 자동/이슈 처리
    if(ni){
      // 수동 선택된 뉴스로 직접 처리
      const mode=(()=>{const m={normal:{max:0.015,bias:0},bull:{max:0.02,bias:0.004},bear:{max:0.02,bias:-0.004},flat:{max:0.005,bias:0},surge:{max:0.06,bias:0.03},crash:{max:0.07,bias:-0.04}};return m[state.marketMode||'normal']||m.normal;})();
      let c=(Math.random()*mode.max*2-mode.max)+mode.bias;
      if(ni.p) c=c*0.6+Math.abs(c)*0.4; else c=c*0.6-Math.abs(c)*0.4;
      c=c-0.0005;
      const prev=state.stocks[s.id].price;
      const np=Math.max(1,parseFloat((prev*(1+c)).toFixed(2)));
      state.stocks[s.id].price=np;
      state.stocks[s.id].history.push(np);
      if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
      state.news.unshift({sid:s.id,t:ni.t,p:ni.p,date:dStr(),price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    }
  });
  // 수동 미선택 종목은 runMarket 방식으로
  const allManual=STOCKS.every(s=>{const sel=document.getElementById('nS-'+s.id);return sel&&sel.value!=='';});
  if(!allManual){
    // 미선택 종목만 자동처리 — lastMD 리셋 후 runMarket
    const prevMD=state.lastMD;
    state.lastMD=null;
    runMarket();
    state.lastMD=kst().toDateString();
  } else {
    state.lastMD=kst().toDateString();
  }
  if(state.news.length>60) state.news=state.news.slice(0,60);
  ss();showToast('뉴스 발행 완료!');rTeacher(document.getElementById('tab-teacher'));
}

function addTeacherIssue(){
  if(!state.teacherIssues) state.teacherIssues=[];
  let added=0;
  STOCKS.forEach(s=>{
    const txt=document.getElementById('issue-'+s.id)?.value?.trim();
    const p=document.getElementById('issueType-'+s.id)?.value==='true';
    if(txt){
      state.teacherIssues.push({sid:s.id,text:txt,p,used:false});
      added++;
    }
  });
  if(!added){showToast('이슈 내용을 입력해주세요.');return;}
  ss();showToast(`이슈 ${added}건 등록 완료! 다음 뉴스 발행 시 반영됩니다.`);
  rTeacher(document.getElementById('tab-teacher'));
}

function bulkDeposit(){
  const amt=parseFloat(document.getElementById('bulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  openModal('일괄 입금 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게 1인당 <strong>${fE(amt)}</strong>를 입금합니다.</p>`,[
    {l:'입금',c:'bsuc',f:()=>{
      let cnt=0;
      STUDENTS.forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return; // 투자 기록 없으면 제외
        st.bal=parseFloat((st.bal+amt).toFixed(2));
        st.dep0=(st.dep0||0)+amt;
        addTxLog('deposit',s.name,amt,cu.name,'일괄 입금');
        cnt++;
      });
      ss();showToast(`${cnt}명에게 일괄 입금 완료!`);closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function bulkWithdraw(){
  const amt=parseFloat(document.getElementById('bulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  const withdrawAmt=Math.round(amt);
  openModal('일괄 회수 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게서 1인당 <strong>${fE(withdrawAmt)}</strong>를 회수합니다. 잔액 부족한 학생은 제외됩니다.</p>`,[
    {l:'회수',c:'bdan',f:()=>{
      let cnt=0,skip=0;
      STUDENTS.forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return;
        if(st.bal<withdrawAmt){skip++;return;}
        st.bal=parseFloat((st.bal-withdrawAmt).toFixed(2));
        st.dep0=Math.max(0,(st.dep0||0)-withdrawAmt);
        addTxLog('withdraw',s.name,withdrawAmt,cu.name,'일괄 회수');
        cnt++;
      });
      ss();showToast(`${cnt}명 회수 완료${skip>0?` (잔액부족 ${skip}명 제외)`:''}`);closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function addStudent(){
  const no=parseInt(document.getElementById('newStuNo')?.value);
  const name=document.getElementById('newStuName')?.value?.trim();
  if(!no||!name){showToast('번호와 이름을 입력해주세요.');return;}
  const allNames=[...STUDENTS,...(state.extraStudents||[])].map(s=>s.name);
  if(allNames.includes(name)){showToast('이미 존재하는 이름입니다.');return;}
  if(!state.extraStudents) state.extraStudents=[];
  state.extraStudents.push({no,name});
  if(!state.students[name]) state.students[name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0},iconMap:{}};
  // 동물 이모지 배정
  if(!state.animalEmojis) state.animalEmojis={};
  if(!state.animalEmojis[name]){
    const used=new Set(Object.values(state.animalEmojis).filter(Boolean));
    const avail=ANIMAL_EMOJIS.filter(e=>!used.has(e));
    state.animalEmojis[name]=avail[0]||'🐾';
    set(ref(db,ROOT+'/animalEmojis'),state.animalEmojis).catch(()=>{});
  }
  ss();showToast(`${no}번 ${name} 추가 완료!`);
  populateStudentSelect();
  rTeacher(document.getElementById('tab-teacher'));
}
function removeStudent(){
  const name=document.getElementById('rmStuSel')?.value;
  if(!name){showToast('학생을 선택해주세요.');return;}
  if(TEST_ACCOUNTS.includes(name)){showToast('테스트 계정은 삭제할 수 없습니다.');return;}
  openModal('학생 삭제',`<p class="tsm"><strong>${name}</strong>을(를) 비활성화합니다. 투자 데이터는 유지됩니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      if(!state.removedStudents) state.removedStudents=[];
      if(!state.removedStudents.includes(name)) state.removedStudents.push(name);
      ss();closeModal();showToast(`${name} 비활성화 완료`);
      populateStudentSelect();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function restoreStudent(){
  const name=document.getElementById('rmStuSel')?.value;
  if(!name){showToast('학생을 선택해주세요.');return;}
  state.removedStudents=(state.removedStudents||[]).filter(n=>n!==name);
  ss();showToast(`${name} 복구 완료!`);
  populateStudentSelect();
  rTeacher(document.getElementById('tab-teacher'));
}
// 복권 이모지 토글
function toggleLotteryEmoji(e){
  const cur=state.lotteryEmojis||[];
  let next;
  if(cur.includes(e)) next=cur.filter(x=>x!==e);
  else if(cur.length>=5){showToast('최대 5개까지만 선택 가능합니다.');return;}
  else next=[...cur,e];
  state.lotteryEmojis=next;
  // UI 업데이트
  document.querySelectorAll('[id^="le-"]').forEach(el=>{
    const em=el.id.replace('le-','');
    el.style.borderColor=next.includes(em)?'var(--primary)':'transparent';
    el.style.background=next.includes(em)?'var(--pl)':'transparent';
  });
  const disp=document.getElementById('lotterySelDisp');
  if(disp) disp.textContent=next.join(' ');
}
function chgTPw(){
  const pw=document.getElementById('nTPw').value;
  if(!validatePw(pw)){showToast('4~12자리, 영문+숫자를 모두 포함해야 합니다.');return;}
  state.teacherPw=pw;ss();showToast('선생님 비밀번호 변경!');document.getElementById('nTPw').value='';
}
function chgCs(){
  const n=document.getElementById('nCs').value;state.cashierName=n;ss();
  showToast(`투자관리자 → ${n}`);rTeacher(document.getElementById('tab-teacher'));
}
function chgPolice(){
  const p1=document.getElementById('nPolice1').value;
  const p2=document.getElementById('nPolice2').value;
  if(p1===p2){showToast('같은 학생을 두 번 선택할 수 없습니다.');return;}
  state.police=[p1,p2];ss();
  showToast(`경찰: ${p1}, ${p2} 설정 완료!`);
  rTeacher(document.getElementById('tab-teacher'));
}
function chgVice(){
  const v1=document.getElementById('nVice1').value;
  const v2=document.getElementById('nVice2').value;
  if(v1===v2){showToast('같은 학생을 두 번 선택할 수 없습니다.');return;}
  state.viceTeachers=[v1,v2];ss();
  showToast(`부담임: ${v1}, ${v2} 설정 완료!`);
  rTeacher(document.getElementById('tab-teacher'));
}
function saveLotteryEmojis(){
  if(!state.lotteryEmojis||state.lotteryEmojis.length===0){
    showToast('최소 1개 이상 선택해주세요.');return;
  }
  ss();showToast(`복권 이모지 저장: ${state.lotteryEmojis.join(' ')}`);
  rTeacher(document.getElementById('tab-teacher'));
}
function toggleBoard(){
  state.boardEnabled=!(state.boardEnabled!==false);
  ss();showToast(`게시판 ${state.boardEnabled?'공개':'숨김'} 처리됨`);
  buildTabs();
}
function toggleTimer(){
  state.timerEnabled=!(state.timerEnabled!==false);
  ss();showToast(`접속 타이머 ${state.timerEnabled?'ON':'OFF'}`);
  rTeacher(document.getElementById('tab-teacher'));
}
function addDonGoal(){
  if(!state.donationGoals) state.donationGoals=[];
  state.donationGoals.push({id:'g'+Date.now(),amount:500,reward:'새 보상'});
  ss();rTeacher(document.getElementById('tab-teacher'));
}
function removeDonGoal(id){
  state.donationGoals=(state.donationGoals||[]).filter(g=>g.id!==id);
  ss();rTeacher(document.getElementById('tab-teacher'));
}
function saveDonGoals(){
  const goals=state.donationGoals||[];
  goals.forEach((g,i)=>{
    const amt=parseFloat(document.getElementById(`dg-amt-${i}`)?.value);
    const rwd=document.getElementById(`dg-rwd-${i}`)?.value?.trim();
    if(amt>0) g.amount=amt;
    if(rwd) g.reward=rwd;
  });
  state.donationGoals=goals.sort((a,b)=>a.amount-b.amount);
  ss();showToast('기부 목표 저장 완료!');rTeacher(document.getElementById('tab-teacher'));
}
function resetDonation(){
  openModal('기부액 초기화',`<p class="tsm">누적 기부액을 0으로 초기화합니다. 기부 내역도 삭제됩니다.</p>`,[
    {l:'초기화',c:'bdan',f:()=>{
      state.totalDonation=0;state.donationLog=[];
      ss();closeModal();showToast('기부액 초기화 완료');rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function resetAllEmojis(){
  openModal('이모지 전체 초기화',`
    <p class="tsm">모든 학생의 이모지 보관함과 커스텀 이모지를 초기화합니다.<br/>기본 이모지(🌿)로 돌아갑니다.<br/><strong>이 작업은 되돌릴 수 없습니다.</strong></p>
  `,[
    {l:'초기화',c:'bdan',f:()=>{
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        const st=state.students[s.name];
        if(!st) return;
        delete st.customEmoji;
        st.iconMap={};
        st.iconSpent=0;
      });
      state.animalEmojis={};
      state.lotteryWon={};
      ss();
      closeModal();
      showToast('✅ 모든 이모지 초기화 완료! 기본 이모지(🌿)로 변경됐습니다.');
      populateStudentSelect();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function resetAll(){
  openModal('초기화 확인','<p class="tsm">주가·뉴스를 초기화하고 30일 시뮬레이션을 재실행합니다. 학생 잔액·보유 주식은 유지됩니다.</p>',[

      state.news=news;state.lastMD=null;ss();showToast('초기화 완료!');closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

// ── MODAL / TOAST
function openModal(title,body,acts){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  const ae=document.getElementById('mActs');ae.innerHTML='';
  acts.forEach(a=>{const b=document.createElement('button');b.className=`btn ${a.c}`;b.textContent=a.l;b.style.flex='1';b.onclick=a.f;ae.appendChild(b);});
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
